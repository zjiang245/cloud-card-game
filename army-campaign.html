  const $=s=>document.querySelector(s),board=$('#board');let nodes=[],edges=[],pieces=[],phase='idle',turn=0,currentLevel=1,selected=null,valid=[],setupSelected=null,draggedPiece=null,over=false,aiTimer=null,lastTrail=null,lastBattle=null,battleEarned=0;
  let shards=+(localStorage.getItem('armyCampaignShards')||0),unlocked=Math.max(1,Math.min(4,+(localStorage.getItem('armyCampaignUnlocked')||1))),inventory=readStore('armyCampaignInventory'),casualties=readStore('armyCampaignCasualties');
  function readStore(key){try{return JSON.parse(localStorage.getItem(key)||'{}')}catch(e){return{}}}function saveCampaign(){localStorage.setItem('armyCampaignShards',shards);localStorage.setItem('armyCampaignUnlocked',unlocked);localStorage.setItem('armyCampaignInventory',JSON.stringify(inventory));localStorage.setItem('armyCampaignCasualties',JSON.stringify(casualties))}
  function getCoins(){let value=localStorage.getItem('cloudCoins');return value===null?1000:Math.max(0,+value||0)}function setCoins(value){localStorage.setItem('cloudCoins',String(Math.max(0,Math.floor(value))))}
  function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function key(x,y){return`${x},${y}`}function nodeAt(x,y){return nodes.find(n=>n.x===x&&n.y===y)}function pieceAt(id){return pieces.find(p=>p.node===id&&!p.dead)}function addNode(x,y,owner,row,col,type='post',rail=false){if(!nodeAt(x,y))nodes.push({id:key(x,y),x,y,owner,row,col,type,rail})}
  function buildMap(){nodes=[];edges=[];const camps=['1,1','1,3','2,2','3,1','3,3'];for(let r=0;r<6;r++)for(let c=0;c<5;c++)addNode(6+c,11+r,0,r,c,camps.includes(`${r},${c}`)?'camp':r===5&&(c===1||c===3)?'hq':'post',r===0||r===4||c===0||c===4);for(let r=0;r<6;r++)for(let c=0;c<5;c++)addNode(5-r,6+c,1,r,c,camps.includes(`${r},${c}`)?'camp':r===5&&(c===1||c===3)?'hq':'post',r===0||r===4||c===0||c===4);for(let r=0;r<6;r++)for(let c=0;c<5;c++)addNode(6+c,5-r,2,r,c,camps.includes(`${r},${c}`)?'camp':r===5&&(c===1||c===3)?'hq':'post',r===0||r===4||c===0||c===4);for(let r=0;r<6;r++)for(let c=0;c<5;c++)addNode(11+r,6+c,3,r,c,camps.includes(`${r},${c}`)?'camp':r===5&&(c===1||c===3)?'hq':'post',r===0||r===4||c===0||c===4);for(let y=6;y<=10;y+=2)for(let x=6;x<=10;x+=2)addNode(x,y,-1,0,0,'center',true);let seen=new Set;for(let a of nodes)for(let b of nodes){let d=Math.abs(a.x-b.x)+Math.abs(a.y-b.y),linked=d===1||(a.type==='camp'&&a.owner===b.owner&&Math.abs(a.x-b.x)===1&&Math.abs(a.y-b.y)===1);if(!linked)continue;let pair=[a.id,b.id].sort(),id=pair.join('|');if(seen.has(id))continue;seen.add(id);let back=a.owner===b.owner&&a.owner>=0&&Math.min(a.row,b.row)===4&&Math.max(a.row,b.row)===5;edges.push([pair[0],pair[1],!back&&a.rail&&b.rail?'rail':'road'])}let center=nodes.filter(n=>n.type==='center');for(let a of center)for(let b of center)if(Math.abs(a.x-b.x)+Math.abs(a.y-b.y)===2){let pair=[a.id,b.id].sort();if(!edges.some(e=>e[0]===pair[0]&&e[1]===pair[1]))edges.push([pair[0],pair[1],'rail'])}let army=(o,r,c)=>nodes.find(n=>n.owner===o&&n.row===r&&n.col===c).id;[[army(0,0,0),army(1,0,4)],[army(1,0,0),army(2,0,0)],[army(2,0,4),army(3,0,0)],[army(3,0,4),army(0,0,4)]].forEach(([a,b])=>edges.push([a,b,'corner-rail']))}
  function pos(n){return{x:n.x/16*96+2,y:n.y/16*96+2}}function railNeighbors(id,types=['rail']){return edges.filter(e=>types.includes(e[2])&&(e[0]===id||e[1]===id)).map(e=>nodes.find(n=>n.id===(e[0]===id?e[1]:e[0])))}
  function cornerRoutes(n,routes){if(n.owner<0||n.row>4||(n.col!==0&&n.col!==4))return;for(let edge of edges.filter(e=>e[2]==='corner-rail')){let a=nodes.find(x=>x.id===edge[0]),b=nodes.find(x=>x.id===edge[1]);if(a.owner!==n.owner)[a,b]=[b,a];if(a.owner!==n.owner||a.col!==n.col)continue;let side=nodes.filter(x=>x.owner===n.owner&&x.col===n.col&&x.row<=4).sort((x,y)=>x.row-y.row),from=side.findIndex(x=>x.id===n.id),end=side.findIndex(x=>x.id===a.id),step=Math.sign(end-from),path=[n.id],blocked=false;for(let i=from+step;i!==end+step;i+=step){path.push(side[i].id);if(pieceAt(side[i].id)){blocked=true;break}}if(blocked)continue;path.push(b.id);routes.set(b.id,[...path]);if(pieceAt(b.id))continue;let other=nodes.filter(x=>x.owner===b.owner&&x.col===b.col&&x.row<=4).sort((x,y)=>x.row-y.row),start=other.findIndex(x=>x.id===b.id);for(let i=start+1;i<other.length;i++){path.push(other[i].id);routes.set(other[i].id,[...path]);if(pieceAt(other[i].id))break}}}
  function railRoutes(p){let n=nodes.find(x=>x.id===p.node),routes=new Map;if(!n?.rail)return routes;if(p.name==='工兵'){let q=[[n.id,[n.id]]],seen=new Set([n.id]);while(q.length){let[at,path]=q.shift();for(let x of railNeighbors(at,['rail','corner-rail'])){if(seen.has(x.id))continue;seen.add(x.id);let next=[...path,x.id];routes.set(x.id,next);if(!pieceAt(x.id))q.push([x.id,next])}}return routes}for(let first of railNeighbors(n.id,['rail','corner-rail'])){let dx=Math.sign(first.x-n.x),dy=Math.sign(first.y-n.y),at=n,next=first,path=[n.id];while(next){path.push(next.id);routes.set(next.id,[...path]);if(pieceAt(next.id))break;let onward=railNeighbors(next.id,['rail','corner-rail']).filter(x=>x.id!==at.id&&Math.sign(x.x-next.x)===dx&&Math.sign(x.y-next.y)===dy);at=next;next=onward[0]}}cornerRoutes(n,routes);return routes}

  function line(a,b,t){let A=pos(nodes.find(n=>n.id===a)),B=pos(nodes.find(n=>n.id===b)),dx=B.x-A.x,dy=B.y-A.y,el=document.createElement('i');el.className=`road ${t}`;el.style.cssText=`left:${A.x}%;top:${A.y}%;width:${Math.hypot(dx,dy)}%;transform:rotate(${Math.atan2(dy,dx)*180/Math.PI}deg)`;board.appendChild(el)}
  function draw(){board.innerHTML='';edges.forEach(e=>line(...e));if(lastTrail)lastTrail.path.slice(0,-1).forEach((id,i)=>{let n=nodes.find(x=>x.id===id),next=nodes.find(x=>x.id===lastTrail.path[i+1]),at=pos(n),el=document.createElement('span');el.className='trail';el.textContent='➤';el.style.cssText=`left:${at.x}%;top:${at.y}%;transform:translate(-50%,-50%) rotate(${Math.atan2(next.y-n.y,next.x-n.x)*180/Math.PI}deg)`;board.appendChild(el)});if(lastBattle){let n=nodes.find(x=>x.id===lastBattle),at=pos(n),el=document.createElement('span');el.className='battle-flash';el.style.cssText=`left:${at.x}%;top:${at.y}%`;board.appendChild(el)}for(let n of nodes){let p=pieceAt(n.id),at=pos(n),el=document.createElement('button');el.className=`node ${n.type} ${n.rail?'rail':''} ${valid.includes(n.id)?'valid':''} ${selected?.node===n.id?'selected':''} ${phase==='setup'&&n.owner===0&&n.type!=='camp'?'setup-target':''}`;el.style.cssText=`left:${at.x}%;top:${at.y}%`;el.dataset.node=n.id;if(p){let hidden=isPurple(p.owner)&&phase!=='over';el.innerHTML=`<span class="piece ${p.owner===0?'red':'purple'} ${hidden?'hidden':''} ${setupSelected===p.id?'setup-picked':''}">${hidden?'':short[p.name]}</span>`;if(phase==='setup'&&p.owner===0)bindSetup(el.firstElementChild,p)}else if(n.type==='camp')el.innerHTML='<span>营</span>';else if(n.type==='hq')el.textContent='本';el.onclick=()=>clickNode(n.id);if(phase==='setup'&&n.owner===0&&n.type!=='camp'){el.ondragover=e=>e.preventDefault();el.ondrop=e=>{e.preventDefault();placeSetup(e.dataTransfer.getData('text/plain')||draggedPiece,n.id)}}board.appendChild(el)}renderTray();updateInfo()}
  function bindSetup(el,p){el.draggable=true;el.onclick=e=>{e.stopPropagation();if(setupSelected&&setupSelected!==p.id&&p.node)return placeSetup(setupSelected,p.node);setupSelected=setupSelected===p.id?null:p.id;draw()};el.ondragstart=e=>{draggedPiece=p.id;e.dataTransfer.setData('text/plain',p.id)}}function validSetup(p,n){return n&&n.owner===0&&n.type!=='camp'&&(p.name!=='军旗'||n.type==='hq')&&(p.name!=='地雷'||n.row>=4)&&(p.name!=='炸弹'||n.row!==0)}
  function placeSetup(id,nodeId){let p=pieces.find(x=>x.id===id&&x.owner===0),n=nodes.find(x=>x.id===nodeId);if(!p||!validSetup(p,n))return alert(p?.name==='军旗'?'军旗只能放在大本营。':p?.name==='地雷'?'地雷只能放最后两排。':p?.name==='炸弹'?'炸弹不能放第一排。':'这里不能布子。');let other=pieceAt(nodeId),source=p.node;if(other&&source){let old=nodes.find(x=>x.id===source);if(!validSetup(other,old))return alert('交换后不符合布阵规则。');other.node=source}else if(other)other.node=null;p.node=nodeId;setupSelected=null;draw()}
  function renderTray(){let tray=$('#tray');tray.innerHTML='';if(phase!=='setup')return;let unplaced=pieces.filter(p=>p.owner===0&&!p.node),groups={};unplaced.forEach(p=>groups[p.name]=(groups[p.name]||0)+1);Object.keys(short).filter(name=>groups[name]).forEach(name=>{let el=document.createElement('span'),picked=pieces.find(p=>p.id===setupSelected)?.name===name;el.className=`tray-piece ${picked?'picked':''}`;el.innerHTML=`<span>${short[name]}</span><i class="tray-count">×${groups[name]}</i>`;el.draggable=true;el.onclick=e=>{e.stopPropagation();let p=pieces.find(x=>x.owner===0&&!x.node&&x.name===name);setupSelected=setupSelected===p?.id?null:p?.id||null;draw()};el.ondragstart=e=>{let p=pieces.find(x=>x.owner===0&&!x.node&&x.name===name);if(!p)return;draggedPiece=p.id;e.dataTransfer.setData('text/plain',p.id)};tray.appendChild(el)})}
  function deployEnemy(army,owner=2,backOnly=false){let hand=shuffle(army.map((name,i)=>({id:`${owner}-${i}`,owner,name,node:null,dead:false}))),slots=nodes.filter(n=>n.owner===owner&&n.type!=='camp'&&(!backOnly||n.row>=3)),take=f=>{let opts=slots.filter(n=>!hand.some(p=>p.node===n.id)&&f(n));return opts[Math.floor(Math.random()*opts.length)]};hand.find(p=>p.name==='军旗').node=take(n=>n.type==='hq').id;hand.filter(p=>p.name==='地雷').forEach(p=>p.node=take(n=>n.row>=4).id);hand.filter(p=>p.name==='炸弹').forEach(p=>p.node=take(n=>n.row!==0).id);hand.filter(p=>!p.node).forEach(p=>p.node=take(()=>true).id);return hand}
  function availableArmyCounts(){let counts={};standard.forEach(name=>counts[name]=(counts[name]||0)+1);Object.entries(inventory).forEach(([name,count])=>counts[name]=(counts[name]||0)+count);Object.entries(casualties).forEach(([name,count])=>{if(name!=='军旗')counts[name]=Math.max(0,(counts[name]||0)-count)});return counts}
  function makePlayerArmy(){let out=[],counts=availableArmyCounts();Object.keys(short).forEach(name=>{for(let i=0;i<(counts[name]||0);i++)out.push({id:`0-${name}-${i}`,owner:0,name,node:null,dead:false})});return out}
  function startLevel(level){if(level>unlocked)return;clearTimeout(aiTimer);currentLevel=level;phase='setup';turn=0;selected=null;valid=[];setupSelected=null;over=false;lastTrail=null;lastBattle=null;battleEarned=0;buildMap();let config=levels[level],enemies=deployEnemy(config.army,2);if(config.sideArmy)enemies.push(...deployEnemy(config.sideArmy,3,true));pieces=enemies.concat(makePlayerArmy());$('#levelScreen').classList.remove('show');$('#resultModal').classList.remove('show');$('#setupActions').classList.remove('hidden-ui');$('#gameActions').classList.add('hidden-ui');$('#tray').classList.remove('hidden-ui');$('#log').innerHTML='';log(`进入${config.name}，请从基础军队和背包中选择最多25枚布阵。`);if(config.sideArmy)log('第四关：对面与右侧紫军共享回合，必须夺取两面军旗。');draw()}
  function withdrawAll(){pieces.filter(p=>p.owner===0).forEach(p=>p.node=null);setupSelected=null;draw()}function quickSetup(){withdrawAll();let own=pieces.filter(p=>p.owner===0),flag=own.find(p=>p.name==='军旗');if(!flag)return alert('当前军队没有军旗，无法开局。');let chosen=[flag,...own.filter(p=>p!==flag).sort((a,b)=>(rank[b.name]||0)-(rank[a.name]||0)).slice(0,24)],slots=nodes.filter(n=>n.owner===0&&n.type!=='camp'),take=f=>{let opts=slots.filter(n=>!pieceAt(n.id)&&f(n));return opts[Math.floor(Math.random()*opts.length)]};flag.node=take(n=>n.type==='hq').id;chosen.filter(p=>p.name==='地雷').forEach(p=>p.node=take(n=>n.row>=4).id);chosen.filter(p=>p.name==='炸弹').forEach(p=>p.node=take(n=>n.row!==0).id);chosen.filter(p=>!p.node).forEach(p=>p.node=take(()=>true).id);draw();log(`已使用当前军队完成${chosen.length}枚快速布阵。`)}
  function confirmSetup(){let placed=pieces.filter(p=>p.owner===0&&p.node),flag=placed.filter(p=>p.name==='军旗');if(!placed.length||placed.length>25)return alert('请布置1至25枚棋子。');if(flag.length!==1||nodes.find(n=>n.id===flag[0].node)?.type!=='hq')return alert('必须且只能布置一面军旗，并放入大本营。');if(placed.filter(p=>p.name==='地雷').some(p=>nodes.find(n=>n.id===p.node).row<4))return alert('地雷只能放最后两排。');if(placed.filter(p=>p.name==='炸弹').some(p=>nodes.find(n=>n.id===p.node).row===0))return alert('炸弹不能放第一排。');if(!placed.some(p=>!['军旗','地雷'].includes(p.name)&&nodes.find(n=>n.id===p.node).type!=='hq'))return alert('至少布置一枚可以行动的棋子。');pieces=pieces.filter(p=>p.owner===2||p.node);phase='play';$('#setupActions').classList.add('hidden-ui');$('#tray').classList.add('hidden-ui');$('#gameActions').classList.remove('hidden-ui');log(`布阵完成：红方以${placed.length}枚棋子开始闯关。`);draw()}
  function clickNode(id){if(over)return;let p=pieceAt(id),n=nodes.find(x=>x.id===id);if(phase==='setup'){if(n.owner!==0||n.type==='camp')return;if(setupSelected)return placeSetup(setupSelected,id);if(p?.owner===0){setupSelected=p.id;draw()}return}if(phase!=='play'||turn!==0)return;if(selected&&valid.includes(id))return move(selected,id);if(p?.owner===0){selected=p;valid=legal(p);draw()}else{selected=null;valid=[];draw()}}
  function battle(a,d){if(a.name==='炸弹'||d.name==='炸弹')return 0;if(d.name==='地雷')return a.name==='工兵'?1:-1;if(d.name==='军旗')return 1;let x=rank[a.name],y=rank[d.name];return x===y?0:x>y?1:-1}function movePath(p,id){return railRoutes(p).get(id)||[p.node,id]}
  function gainFor(p){if(!isPurple(p.owner))return;let amount=reward[p.name]||0;shards+=amount;battleEarned+=amount;saveCampaign();log(`🧩 歼灭紫方${p.name}，获得${amount}碎片。`)}
  function recordCasualty(p){if(p?.owner!==0||p.name==='军旗'||p.casualtyRecorded)return;p.casualtyRecorded=true;casualties[p.name]=(casualties[p.name]||0)+1;saveCampaign();log(`🪦 我方${p.name}阵亡，后续对局不可再用。`)}
  function enemyFlagsAlive(){return pieces.filter(p=>isPurple(p.owner)&&p.name==='军旗'&&!p.dead).length}function hasMove(owner){return pieces.some(p=>p.owner===owner&&!p.dead&&legal(p).length)}function hasEnemyMove(){return pieces.some(p=>isPurple(p.owner)&&!p.dead&&legal(p).length)}
  function move(p,id){let d=pieceAt(id);lastTrail={owner:p.owner,path:movePath(p,id)};lastBattle=d?id:null;if(!d)p.node=id;else{let r=battle(p,d);if(r>=0){d.dead=true;gainFor(d);recordCasualty(d)}if(r<=0){p.dead=true;gainFor(p);recordCasualty(p)}if(r>0)p.node=id;log(`${p.owner===0?'红方':'紫方'}进攻：${r>0?'获胜':r<0?'失败':'同归于尽'}。`);if(d.name==='军旗'&&d.dead){if(p.owner===0&&currentLevel===4&&enemyFlagsAlive()>0)log(`🚩 已俘获一面紫方军旗，还需夺取${enemyFlagsAlive()}面。`);else return finish(p.owner===0)}}selected=null;valid=[];if(p.owner===0){if(!hasEnemyMove())return finish(true);turn=2;draw();aiTimer=setTimeout(ai,1200)}else{if(!hasMove(0))return finish(false);turn=0;draw()}}
  function ai(){if(over||turn!==2)return;let moves=[];pieces.filter(p=>isPurple(p.owner)&&!p.dead).forEach(p=>legal(p).forEach(id=>{let n=nodes.find(x=>x.id===id),d=pieceAt(id),score=Math.random()*14+(n.owner===0?n.row*3:0);if(d)score+=d.name==='军旗'?10000:55+(rank[d.name]||3)*7;if(d?.name==='地雷'&&p.name==='工兵')score+=80;moves.push({p,id,score})}));if(!moves.length)return finish(true);moves.sort((a,b)=>b.score-a.score);move(moves[0].p,moves[0].id)}
  function finish(win){if(over)return;over=true;clearTimeout(aiTimer);phase='over';pieces.filter(p=>isPurple(p.owner)).forEach(p=>p.hidden=false);let newlyUnlocked=win&&currentLevel<4&&unlocked<currentLevel+1;if(newlyUnlocked){unlocked=currentLevel+1;saveCampaign()}draw();$('#resultTitle').textContent=win?'闯关成功':'闯关失败';$('#resultText').innerHTML=`<p>${win?(newlyUnlocked?`第${currentLevel+1}关已解锁！`:currentLevel===4?'全部现有关卡已通关！':'本关再次通关！'):'整顿军队后再来。'}</p><p>本局获得：🧩 ${battleEarned}<br>现有碎片：🧩 ${shards}</p>`;$('#nextLevel').style.display=win&&currentLevel<4?'inline-block':'none';$('#resultModal').classList.add('show')}
  function updateInfo(){let placed=pieces.filter(p=>p.owner===0&&p.node&&!p.dead).length,enemy=pieces.filter(p=>isPurple(p.owner)&&!p.dead).length,flags=enemyFlagsAlive();$('#turnText').textContent=phase==='setup'?`布阵中 ${placed}/25`:phase==='play'?(turn===0?'红方行动':'紫方思考中…'):phase==='over'?'本关结束':'请选择关卡';$('#stageInfo').innerHTML=levels[currentLevel]?`<b>${levels[currentLevel].name}</b><br>红方在场：${placed}　紫方剩余：${enemy}${currentLevel===4?`　军旗：${flags}`:''}<br>本局碎片：🧩 ${battleEarned}`:'';$('#headerShards').textContent=shards}
  function log(text){let el=$('#log'),line=document.createElement('div');line.textContent=text;el.appendChild(line);el.scrollTop=el.scrollHeight}
  function renderLevelScreen(){$('#levelCoins').textContent=getCoins();$('#levelShards').textContent=shards;$('#headerShards').textContent=shards;let grid=$('#levelGrid');grid.innerHTML='';Object.entries(levels).forEach(([id,l])=>{let locked=+id>unlocked,enemyCount=l.army.length+(l.sideArmy?.length||0),el=document.createElement('article');el.className=`level ${locked?'locked':''}`;el.innerHTML=`<h2>${locked?'🔒':'⚔️'} ${l.name}</h2><p>${l.desc}<br>敌军：${enemyCount}枚</p><button ${locked?'disabled':''}>${locked?'通关前一关后解锁':'进入关卡'}</button>`;if(!locked)el.querySelector('button').onclick=()=>startLevel(+id);grid.appendChild(el)});let shop=$('#shop');shop.innerHTML='';Object.entries(cost).forEach(([name,price])=>{let el=document.createElement('div');el.className='shop-item';el.innerHTML=`<b>${name}</b><small>🧩 ${price}</small><button data-buy="${name}">兑换</button>`;shop.appendChild(el)});shop.querySelectorAll('[data-buy]').forEach(b=>b.onclick=()=>buyUnit(b.dataset.buy));let available=Object.entries(availableArmyCounts()).filter(([,n])=>n>0),dead=Object.entries(casualties).filter(([name,n])=>name!=='军旗'&&n>0);$('#inventory').innerHTML=`<b>🎒 当前可用军队</b><br>${available.map(([n,c])=>`${n} × ${c}`).join('　')||'无可用单位'}<br><b>🪦 累计阵亡</b><br>${dead.length?dead.map(([n,c])=>`${n} × ${c}`).join('　'):'暂无阵亡'}`;$('#levelScreen').classList.add('show')}
  function exchangeCoins(){let coins=getCoins();if(coins<100)return alert('通用金币不足100，无法兑换。');setCoins(coins-100);shards+=10;saveCampaign();renderLevelScreen()}
  function buyUnit(name){let price=cost[name];if(shards<price)return alert(`碎片不足，兑换${name}需要${price}碎片。`);shards-=price;inventory[name]=(inventory[name]||0)+1;saveCampaign();renderLevelScreen()}
  function leaveToLevels(){clearTimeout(aiTimer);phase='idle';over=true;$('#resultModal').classList.remove('show');renderLevelScreen()}
  $('#quickSetup').onclick=quickSetup;$('#confirmSetup').onclick=confirmSetup;$('#withdrawAll').onclick=withdrawAll;$('#backLevels').onclick=leaveToLevels;$('#restartLevel').onclick=()=>startLevel(currentLevel);$('#surrender').onclick=()=>{if(confirm('确定放弃本关吗？'))finish(false)};$('#retry').onclick=()=>startLevel(currentLevel);$('#chooseLevel').onclick=leaveToLevels;$('#nextLevel').onclick=()=>startLevel(Math.min(4,currentLevel+1));$('#exchangeCoins').onclick=exchangeCoins;$('#exitLobby').onclick=()=>location.href='index.html';buildMap();draw();renderLevelScreen();
