  <style>
    *{box-sizing:border-box}html{background:#060b09}body{margin:0;min-height:100vh;color:#f7e5b7;font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(circle at 50% 38%,#264638 0,#111c18 40%,#050908 100%)}button,a,input{font:inherit}button{touch-action:manipulation}
    header{position:sticky;top:0;z-index:30;height:58px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid #a27b4055;background:#07100dec;backdrop-filter:blur(12px)}header a{color:#efd18b;text-decoration:none}.title{font:900 clamp(18px,2.5vw,28px) "STKaiti","KaiTi",serif;letter-spacing:3px}.tools{display:flex;gap:7px}.tools button{padding:7px 11px;border:1px solid #94733f;border-radius:16px;background:#151d18;color:#efd99f;cursor:pointer}
    main{width:min(1120px,98vw);margin:auto;padding:18px;display:grid;grid-template-columns:minmax(360px,680px) minmax(250px,340px);gap:18px;align-items:start}.board-shell{position:relative;padding:14px;border:1px solid #9a784055;border-radius:24px;background:#080d0bcc;box-shadow:0 24px 70px #0009}.board{position:relative;width:100%;aspect-ratio:5/7.7;overflow:hidden;border:8px solid #29261d;border-radius:18px;background:radial-gradient(circle at 50% 50%,#1e352b,#101916 58%,#090e0c);box-shadow:inset 0 0 45px #000b}.board:after{content:"楚河 · 对阵铁路";position:absolute;z-index:1;left:20%;right:20%;top:49.1%;height:2%;display:grid;place-items:center;color:#a88c57;font:700 clamp(10px,1.6vw,16px) "KaiTi",serif;letter-spacing:6px;pointer-events:none}
    .road{position:absolute;z-index:1;height:2px;transform-origin:left center;background:#856e47}.road.rail{height:5px;border:1px solid #d6b875;background:#3e4c41;box-shadow:0 0 0 1px #171b18}.node{position:absolute;z-index:4;width:12%;aspect-ratio:1;transform:translate(-50%,-50%);padding:0;border:2px solid #806b45;border-radius:7px;display:grid;place-items:center;background:#ead9ad;color:#342816;font:900 clamp(9px,1.3vw,14px) "KaiTi",serif;cursor:pointer;box-shadow:0 3px 7px #0007;transition:.14s}.node.rail{border-width:3px;border-color:#50584c}.node.camp{width:10%;transform:translate(-50%,-50%) rotate(45deg);border-color:#438462;background:#c7d9af}.node.camp>*{transform:rotate(-45deg)}.node.hq{border-radius:50%;background:#d7b86f}.node.valid{box-shadow:0 0 0 4px #69e99a,0 0 20px #4bea8c}.node.selected{box-shadow:0 0 0 4px #ffe16c,0 0 18px #ffd73d;transform:translate(-50%,-50%) scale(1.1)}.node.setup-target{border-color:#d85a4f}.piece{position:absolute;inset:2px;display:grid;place-items:center;border-radius:5px;color:white;text-shadow:0 2px 3px #000;font:900 clamp(12px,2vw,22px) "STKaiti","KaiTi",serif;line-height:1;user-select:none}.piece.red{background:linear-gradient(145deg,#d94c40,#9f2923)}.piece.blue{background:linear-gradient(145deg,#4676cc,#244b98)}.piece.hidden{color:transparent;background:linear-gradient(145deg,#315eaa,#182f60)}.piece.covered{inset:1px;color:transparent;border:2px solid #d4b66f;background:repeating-linear-gradient(135deg,#273a33 0 7px,#17241f 7px 14px);box-shadow:inset 0 0 0 2px #4c675b,0 3px 7px #000}.piece.carrier:after{content:"旗";position:absolute;right:-8px;top:-10px;width:20px;height:20px;border:2px solid #ffe28a;border-radius:50%;display:grid;place-items:center;background:#7c321f;color:#fff2ae;font:900 12px "KaiTi",serif;box-shadow:0 0 10px #ffd84c}.piece.reveal{color:#fff4a3;animation:flagFlash .65s infinite alternate}.piece.setup-picked{outline:4px solid #ffe36d}@keyframes flagFlash{to{box-shadow:0 0 20px #ffdd37}}

    aside{padding:17px;border:1px solid #96754155;border-radius:18px;background:#07100dcc;box-shadow:0 20px 55px #0007}.turn{margin-bottom:10px;color:#ffe09a;font:900 21px "KaiTi",serif}.mode-pill{display:inline-block;margin-bottom:10px;padding:5px 10px;border:1px solid #b78a43;border-radius:14px;color:#e8c576;font-size:12px}.status{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}.status div{padding:9px;border-radius:10px;background:#ffffff0a;font-size:12px}.status b{display:block;margin-bottom:3px;font-size:14px}.setup-actions,.game-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 0}.setup-actions button,.game-actions button{padding:10px 6px;border:0;border-radius:18px;background:linear-gradient(#ffe18a,#c98b2e);color:#3a2108;font-weight:900;cursor:pointer}.setup-actions .confirm{background:linear-gradient(#b9e4bd,#4c9a61)}.game-actions .surrender{background:linear-gradient(#ef7568,#9b2822);color:white}.game-actions .restart{background:linear-gradient(#8db6cd,#3f748f);color:#092535}.hidden-ui{display:none!important}.tray{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin:10px 0;padding:7px;border:1px solid #a77943;border-radius:12px;background:#2d1712}.tray-piece{aspect-ratio:1;border:1px solid #f0cc91;border-radius:5px;display:grid;place-items:center;background:#b93c32;color:white;text-shadow:0 1px 2px #000;font:900 clamp(13px,1.6vw,19px) "KaiTi",serif;cursor:pointer}.tray-piece.picked{outline:3px solid #ffe16a}.formation-actions{display:flex;gap:6px;margin-bottom:10px}.formation-actions button{flex:1;padding:7px;border:1px solid #6c96ad;border-radius:12px;background:#193746;color:#cdefff;cursor:pointer}.log{height:210px;overflow:auto;padding:10px;border-radius:10px;background:#0006;color:#c3cec7;font-size:12px;line-height:1.65}.rules{margin-top:12px;color:#aebdb3;font-size:12px;line-height:1.6}
    .modal{position:fixed;z-index:80;inset:0;display:none;place-items:center;padding:18px;background:#000c}.modal.show{display:grid}.card{width:min(520px,94vw);max-height:88vh;overflow:auto;padding:26px;border:1px solid #c49a52;border-radius:20px;background:linear-gradient(160deg,#1d1710,#08100d);text-align:center;box-shadow:0 28px 80px #000}.card h2{margin:0 0 16px;color:#ffe0a0;font:900 28px "KaiTi",serif;letter-spacing:3px}.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.mode-choice{padding:20px 12px;border:1px solid #94733e;border-radius:16px;background:#ffffff08;color:#f6dfaa;cursor:pointer}.mode-choice:hover{border-color:#f0c766;background:#ffffff10}.mode-choice strong{display:block;margin:8px 0;font:900 22px "KaiTi",serif}.mode-choice span{font-size:12px;color:#b8c4bc;line-height:1.6}.result-actions{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}.card button.action{padding:10px 18px;border:0;border-radius:18px;background:#d49a43;color:#352006;font-weight:900;cursor:pointer}.card button.secondary{background:#5d8297;color:white}.report{margin:12px 0;padding:12px;border-radius:12px;background:#ffffff08;text-align:left;line-height:1.8}.formation-save{display:grid;grid-template-columns:1fr auto;gap:7px}.formation-save input{min-width:0;padding:10px;border:1px solid #876b42;border-radius:10px;background:#0b1511;color:white}.formation-list{display:grid;gap:7px;margin:12px 0}.formation-row{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center;padding:8px;border:1px solid #735a38;border-radius:10px;text-align:left}.formation-row button{padding:6px 9px;border:0;border-radius:10px;background:#5d8da5;color:white}.formation-row .delete{background:#8d3932}.replay-bar{position:fixed;z-index:60;left:50%;bottom:14px;transform:translateX(-50%);display:none;align-items:center;gap:6px;padding:9px 12px;border:1px solid #c79c52;border-radius:20px;background:#130e09ee;box-shadow:0 8px 30px #000}.replay-bar.show{display:flex}.replay-bar button{padding:6px 10px;border:0;border-radius:12px;background:#d19a45;font-weight:800}.replay-caption{max-width:260px;color:#f2d79a;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    @media(max-width:760px){header{height:auto;min-height:54px;padding:8px 10px;flex-wrap:wrap}.title{order:-1;width:100%;text-align:center}.tools{width:100%;justify-content:center}.tools button{padding:5px 8px;font-size:12px}main{width:100%;padding:8px;display:block}.board-shell{padding:6px;border-radius:14px}.board{border-width:4px}.board:after{letter-spacing:2px}.node{width:13%;font-size:10px}.piece{font-size:clamp(13px,4.3vw,21px)}aside{margin-top:10px;padding:12px}.log{height:130px}.mode-grid{grid-template-columns:1fr}.replay-caption{max-width:120px}}

<body>
  <header><a href="index.html">← 游戏大厅</a><div class="title">云上两国军棋</div><div class="tools"><button id="modeBtn">选择玩法</button><button id="rulesBtn">规则说明</button><button id="landscape">↻ 横屏</button></div></header>
  <main>
    <section class="board-shell"><div class="board" id="board"></div></section>
    <aside>
      <div class="turn" id="turnText">请选择玩法</div><span class="mode-pill" id="modeText">尚未开局</span> <span class="mode-pill">🪙 大厅金币：<b id="coinCount">0</b></span>
      <div class="status"><div><b id="redLabel">🔴 红方（你）</b><span id="redCount">25枚</span></div><div><b id="blueLabel">🔵 蓝方（电脑）</b><span id="blueCount">25枚</span></div></div>
      <div class="setup-actions hidden-ui" id="setupActions"><button id="quickSetup">快速布阵</button><button class="confirm" id="confirmSetup">完成布阵</button></div>
      <div class="formation-actions hidden-ui" id="formationActions"><button id="saveFormation">保存布阵</button><button id="loadFormation">调入布阵</button></div>
      <div class="tray hidden-ui" id="tray"></div>
      <div class="game-actions hidden-ui" id="gameActions"><button class="restart" id="newGame">重新开始</button><button class="surrender" id="surrender">投降</button></div>
      <div class="log" id="log"></div>
      <div class="rules">翻棋：每回合翻一枚暗子或走一步；先翻出工兵者确定阵营。工兵挖光敌方三雷后，派任一棋子扛旗回己方大本营获胜。</div>
    </aside>
  </main>

  <div class="modal show" id="modeModal"><div class="card"><h2>选择两国军棋玩法</h2><div class="mode-grid"><button class="mode-choice" data-mode="dark"><b>🌑</b><strong>传统翻棋</strong><span>50枚棋子混洗盖住，轮流翻棋。先翻出工兵者确定阵营，挖光敌雷后扛旗回本营。</span></button><button class="mode-choice" data-mode="setup"><b>🧭</b><strong>布阵</strong><span>亲手拖放或点击交换25枚棋子，也可快速布阵、保存并调入阵型。</span></button></div></div></div>
  <div class="modal" id="resultModal"><div class="card"><h2 id="resultTitle">本局结束</h2><div class="report" id="battleReport"></div><div class="result-actions"><button class="action secondary" id="openReplay">全明复盘</button><button class="action" id="playAgain">再来一局</button><button class="action secondary" id="backLobby">返回大厅</button></div></div></div>
  <div class="modal" id="formationModal"><div class="card"><h2>我的两国阵型</h2><div class="formation-save"><input id="formationName" maxlength="16" placeholder="输入阵型名称"><button class="action" id="confirmSave">保存</button></div><div class="formation-list" id="formationList"></div><button class="action secondary" id="closeFormation">关闭</button></div></div>
  <div class="replay-bar" id="replayBar"><button id="replayPrev">◀</button><button id="replayPlay">播放</button><span id="replayProgress">0/0</span><span class="replay-caption" id="replayCaption"></span><button id="replayNext">▶</button><button id="replayExit">退出</button></div>

  <script>
  const names=['司令','军长','师长','师长','旅长','旅长','团长','团长','营长','营长','连长','连长','连长','排长','排长','排长','工兵','工兵','工兵','炸弹','炸弹','地雷','地雷','地雷','军旗'];
  const rank={司令:9,军长:8,师长:7,旅长:6,团长:5,营长:4,连长:3,排长:2,工兵:1},short={司令:'司',军长:'军',师长:'师',旅长:'旅',团长:'团',营长:'营',连长:'连',排长:'排',工兵:'兵',炸弹:'弹',地雷:'雷',军旗:'旗'};
  const $=s=>document.querySelector(s),board=$('#board');
  let nodes=[],edges=[],pieces=[],phase='idle',gameMode=null,turn=0,humanOwner=0,aiOwner=1,selected=null,valid=[],setupSelected=null,draggedPiece=null,over=false,aiTimer=null,lastTrail=null,lastBattle=null,kills={},replayFrames=[],replayMode=false,replayIndex=0,replayTimer=null,replayReturn=null,audioCtx=null;

  function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
  function getCoins(){let value=localStorage.getItem('cloudCoins');return value===null?1000:Math.max(0,+value||0)}function setCoins(value){value=Math.max(0,Math.floor(value));localStorage.setItem('cloudCoins',String(value));$('#coinCount').textContent=value;return value}
  function nodeBy(owner,row,col){return nodes.find(n=>n.owner===owner&&n.row===row&&n.col===col)}
  function pieceAt(id){return pieces.find(p=>!p.dead&&p.node===id)}
  function addEdge(a,b,type){if(!a||!b||edges.some(e=>(e[0]===a.id&&e[1]===b.id)||(e[0]===b.id&&e[1]===a.id)))return;edges.push([a.id,b.id,type])}
  function buildMap(){
    nodes=[];edges=[];const camps=['1,1','1,3','2,2','3,1','3,3'];
    for(let y=0;y<12;y++)for(let col=0;col<5;col++){let owner=y<6?1:0,row=owner===1?5-y:y-6,type=camps.includes(`${row},${col}`)?'camp':row===5&&(col===1||col===3)?'hq':'post',rail=row===0||row===4||col===0||col===4;nodes.push({id:`${owner}-${row}-${col}`,owner,row,col,x:col,y,type,rail})}
    for(let n of nodes){[[1,0],[0,1]].forEach(([dx,dy])=>{let b=nodes.find(q=>q.x===n.x+dx&&q.y===n.y+dy);if(!b)return;if(n.owner!==b.owner&&(n.col===1||n.col===3))return;let backRoad=n.owner===b.owner&&Math.min(n.row,b.row)===4&&Math.max(n.row,b.row)===5;addEdge(n,b,!backRoad&&n.rail&&b.rail?'rail':'road')});if(n.type==='camp')for(let dx of[-1,1])for(let dy of[-1,1])addEdge(n,nodes.find(q=>q.owner===n.owner&&q.x===n.x+dx&&q.y===n.y+dy),'road')}
  }
  function pos(n){return{x:12+n.x*19,y:4+n.y*(92/11)}}
  function edgeNeighbors(id,type){return edges.filter(e=>e[2]===type&&(e[0]===id||e[1]===id)).map(e=>nodes.find(n=>n.id===(e[0]===id?e[1]:e[0])))}
  function railRoutes(p){
    let start=nodes.find(n=>n.id===p.node),routes=new Map;if(!start?.rail)return routes;
    if(p.name==='工兵'){let queue=[[start.id,[start.id]]],seen=new Set([start.id]);while(queue.length){let[at,path]=queue.shift();for(let n of edgeNeighbors(at,'rail')){if(seen.has(n.id))continue;seen.add(n.id);let next=[...path,n.id];routes.set(n.id,next);if(!pieceAt(n.id))queue.push([n.id,next])}}return routes}
    for(let first of edgeNeighbors(start.id,'rail')){let dx=Math.sign(first.x-start.x),dy=Math.sign(first.y-start.y),previous=start,current=first,path=[start.id];while(current){path.push(current.id);routes.set(current.id,[...path]);if(pieceAt(current.id))break;let next=edgeNeighbors(current.id,'rail').find(n=>n.id!==previous.id&&Math.sign(n.x-current.x)===dx&&Math.sign(n.y-current.y)===dy);previous=current;current=next}}
    return routes
  }
  function minesRemaining(owner){return pieces.filter(p=>p.owner===owner&&p.name==='地雷'&&!p.dead).length}
  function legal(p){let here=nodes.find(n=>n.id===p.node);if(!p||p.dead||p.covered||p.name==='地雷'||p.name==='军旗'||(gameMode==='setup'&&here?.type==='hq'))return[];let out=edges.filter(e=>e[2]==='road'&&(e[0]===p.node||e[1]===p.node)).map(e=>e[0]===p.node?e[1]:e[0]);out.push(...railRoutes(p).keys());return[...new Set(out)].filter(id=>{let q=pieceAt(id),dest=nodes.find(n=>n.id===id);if(q?.covered||q?.owner===p.owner||(q&&dest.type==='camp'))return false;if(gameMode==='dark'&&q?.name==='地雷'&&p.name!=='工兵')return false;if(gameMode==='dark'&&q?.name==='军旗'&&minesRemaining(q.owner)>0)return false;return true})}
  function movePath(p,id){return railRoutes(p).get(id)||[p.node,id]}
  function line(a,b,type){let A=pos(nodes.find(n=>n.id===a)),B=pos(nodes.find(n=>n.id===b)),dx=B.x-A.x,dy=B.y-A.y,el=document.createElement('i');el.className=`road ${type}`;el.style.cssText=`left:${A.x}%;top:${A.y}%;width:${Math.hypot(dx,dy)}%;transform:rotate(${Math.atan2(dy,dx)*180/Math.PI}deg)`;board.appendChild(el)}
  function draw(){
    board.innerHTML='';edges.forEach(e=>line(...e));
    if(lastTrail)lastTrail.path.slice(0,-1).forEach((id,i)=>{let n=nodes.find(x=>x.id===id),next=nodes.find(x=>x.id===lastTrail.path[i+1]),at=pos(n),el=document.createElement('span');el.className='trail';el.textContent='➤';el.style.cssText=`left:${at.x}%;top:${at.y}%;transform:translate(-50%,-50%) rotate(${Math.atan2(next.y-n.y,next.x-n.x)*180/Math.PI}deg)`;board.appendChild(el)});
    if(lastBattle){let n=nodes.find(x=>x.id===lastBattle);if(n){let at=pos(n),el=document.createElement('span');el.className='battle-flash';el.style.cssText=`left:${at.x}%;top:${at.y}%`;board.appendChild(el)}}
    for(let n of nodes){let at=pos(n),p=pieceAt(n.id),el=document.createElement('button');el.className=`node ${n.type} ${n.rail?'rail':''} ${valid.includes(n.id)?'valid':''} ${selected?.node===n.id?'selected':''} ${phase==='setup'&&n.owner===0&&n.type!=='camp'?'setup-target':''}`;el.style.cssText=`left:${at.x}%;top:${at.y}%`;el.dataset.node=n.id;let covered=gameMode==='dark'&&!replayMode&&p?.covered,hidden=gameMode==='setup'&&!replayMode&&p?.owner===1&&!p?.reveal;el.setAttribute('aria-label',p?(covered?'未翻棋子':hidden?'蓝方暗棋':`${p.owner?'蓝方':'红方'}${p.name}`):n.type==='camp'?'行营':n.type==='hq'?'大本营':'空位');if(p){el.innerHTML=`<span class="piece ${p.owner?'blue':'red'} ${covered?'covered':''} ${hidden?'hidden':''} ${p.carryingFlag!==undefined?'carrier':''} ${p.reveal?'reveal':''} ${setupSelected===p.id?'setup-picked':''}">${covered||hidden?'':short[p.name]}</span>`;if(phase==='setup'&&p.owner===0)bindSetup(el.firstElementChild,p)}else if(n.type==='camp')el.innerHTML='<span>营</span>';else if(n.type==='hq')el.textContent='本';el.onclick=()=>clickNode(n.id);if(phase==='setup'&&n.owner===0&&n.type!=='camp'){el.ondragover=e=>e.preventDefault();el.ondrop=e=>{e.preventDefault();placeSetup(e.dataTransfer.getData('text/plain')||draggedPiece,n.id)}}board.appendChild(el)}
    renderTray();updateStatus()
  }
  function renderTray(){let tray=$('#tray');tray.innerHTML='';if(phase!=='setup')return;pieces.filter(p=>p.owner===0&&!p.node&&!p.dead).forEach(p=>{let el=document.createElement('span');el.className=`tray-piece ${setupSelected===p.id?'picked':''}`;el.textContent=short[p.name];bindSetup(el,p);tray.appendChild(el)})}
  function bindSetup(el,p){el.draggable=true;el.onclick=e=>{e.stopPropagation();if(setupSelected&&setupSelected!==p.id&&p.node)return placeSetup(setupSelected,p.node);setupSelected=setupSelected===p.id?null:p.id;draw()};el.ondragstart=e=>{draggedPiece=p.id;e.dataTransfer.setData('text/plain',p.id)}}
  function validSetup(p,n){return n&&n.owner===0&&n.type!=='camp'&&(p.name!=='军旗'||n.type==='hq')&&(p.name!=='地雷'||n.row>=4)&&(p.name!=='炸弹'||n.row!==0)}
  function placeSetup(id,nodeId){let p=pieces.find(x=>x.id===id&&x.owner===0),n=nodes.find(x=>x.id===nodeId);if(!p||!validSetup(p,n))return alert(p?.name==='军旗'?'军旗只能放在大本营。':p?.name==='地雷'?'地雷只能放在最后两排。':p?.name==='炸弹'?'炸弹不能放在第一排。':'这里不能布子。');let other=pieceAt(nodeId),source=p.node;if(other&&source){let sourceNode=nodes.find(x=>x.id===source);if(!validSetup(other,sourceNode))return alert('交换后另一枚棋子不符合布阵限制。');other.node=source}else if(other)other.node=null;p.node=nodeId;setupSelected=null;draggedPiece=null;draw()}
  function randomLayout(owner){let hand=shuffle(names.map((name,i)=>({id:`${owner}-${i}`,owner,name,node:null,dead:false}))),slots=nodes.filter(n=>n.owner===owner&&n.type!=='camp'),take=filter=>{let opts=slots.filter(n=>!hand.some(p=>p.node===n.id)&&filter(n));return opts[Math.floor(Math.random()*opts.length)]};let flag=hand.find(p=>p.name==='军旗');flag.node=take(n=>n.type==='hq').id;hand.filter(p=>p.name==='地雷').forEach(p=>p.node=take(n=>n.row>=4).id);hand.filter(p=>p.name==='炸弹').forEach(p=>p.node=take(n=>n.row!==0).id);hand.filter(p=>!p.node).forEach(p=>p.node=take(()=>true).id);return hand}
  function quickSetup(){pieces=pieces.filter(p=>p.owner===1).concat(randomLayout(0));setupSelected=null;draw();log('已生成一套符合规则的随机阵型。')}
  function deployFlip(){let slots=shuffle(nodes.filter(n=>n.type!=='camp')),pool=shuffle([0,1].flatMap(owner=>names.map((name,i)=>({id:`flip-${owner}-${i}`,owner,name,node:null,homeNode:null,covered:true,dead:false}))));pool.forEach((p,i)=>{p.node=slots[i].id;if(p.name==='军旗')p.homeNode=p.node});return pool}
  function deploy(mode){if(mode==='dark'){pieces=deployFlip();return}pieces=randomLayout(1).concat(names.map((name,i)=>({id:`0-${i}`,owner:0,name,node:null,dead:false})))}
  function startMode(mode){clearTimeout(aiTimer);stopReplay();gameMode=mode;phase=mode==='setup'?'setup':'play';turn=0;humanOwner=mode==='dark'?null:0;aiOwner=mode==='dark'?null:1;selected=null;valid=[];setupSelected=null;over=false;lastTrail=null;lastBattle=null;kills={};replayFrames=[];replayMode=false;replayReturn=null;buildMap();deploy(mode);setCoins(getCoins());$('#modeModal').classList.remove('show');$('#resultModal').classList.remove('show');$('#replayBar').classList.remove('show');$('#setupActions').classList.toggle('hidden-ui',phase!=='setup');$('#formationActions').classList.toggle('hidden-ui',phase!=='setup');$('#tray').classList.toggle('hidden-ui',phase!=='setup');$('#gameActions').classList.toggle('hidden-ui',phase!=='play');$('#modeText').textContent=mode==='dark'?'传统翻棋 · 50子混洗':'布阵 · 手动摆棋';$('#log').innerHTML='';log(mode==='dark'?'传统翻棋开局：50枚棋子已混洗盖住。双方只能轮流翻棋，先翻出工兵者获得该颜色。':'请把25枚棋子布置到红方阵地；支持点击两子交换或拖放。');if(phase==='play'){enableAudio();horn();recordFrame('50枚暗子混洗完毕')}draw()}
  function confirmSetup(){let mine=pieces.filter(p=>p.owner===0&&p.name==='地雷'),bomb=pieces.filter(p=>p.owner===0&&p.name==='炸弹'),flag=pieces.find(p=>p.owner===0&&p.name==='军旗');if(pieces.some(p=>p.owner===0&&!p.node))return alert('请先布置全部25枚棋子。');if(nodes.find(n=>n.id===flag.node)?.type!=='hq'||mine.some(p=>nodes.find(n=>n.id===p.node).row<4)||bomb.some(p=>nodes.find(n=>n.id===p.node).row===0))return alert('当前阵型不符合军旗、地雷或炸弹的摆放限制。');phase='play';setupSelected=null;$('#setupActions').classList.add('hidden-ui');$('#formationActions').classList.add('hidden-ui');$('#tray').classList.add('hidden-ui');$('#gameActions').classList.remove('hidden-ui');enableAudio();horn();log('布阵完成，红方先行。');recordFrame('开局阵型');draw()}
  function clickNode(id){enableAudio();if(replayMode||over)return;let p=pieceAt(id),n=nodes.find(x=>x.id===id);if(phase==='setup'){if(n.owner!==0||n.type==='camp')return;if(setupSelected)return placeSetup(setupSelected,id);if(p?.owner===0){setupSelected=p.id;draw()}return}if(phase!=='play'||turn!==0)return;if(gameMode==='dark'&&p?.covered)return flipPiece(p,0);if(humanOwner===null)return;if(selected&&valid.includes(id))return move(selected,id,0);if(p?.owner===humanOwner&&!p.covered){selected=p;valid=legal(p);draw()}else{selected=null;valid=[];draw()}}
  function flipPiece(p,actor){if(!p?.covered||over)return;p.covered=false;lastTrail=null;lastBattle=null;let who=actor===0?'你':'电脑';log(`${who}翻出${p.owner?'蓝':'红'}方${p.name}。`);if(humanOwner===null&&p.name==='工兵'){if(actor===0){humanOwner=p.owner;aiOwner=1-p.owner}else{aiOwner=p.owner;humanOwner=1-p.owner}log(`🎖 阵营确定：你使用${humanOwner?'蓝':'红'}方，电脑使用${aiOwner?'蓝':'红'}方。`)}recordFrame(`${who}翻出${p.owner?'蓝':'红'}方${p.name}`);endTurn(actor)}
  function battle(a,d){if(a.name==='炸弹'||d.name==='炸弹')return 0;if(d.name==='地雷')return a.name==='工兵'?1:-1;if(d.name==='军旗')return 1;let x=rank[a.name],y=rank[d.name];return x===y?0:x>y?1:-1}
  function revealFlag(owner){let f=pieces.find(p=>p.owner===owner&&p.name==='军旗'&&!p.dead);if(f)f.reveal=true}
  function countKill(p){if(p?.owner===aiOwner)kills[p.name]=(kills[p.name]||0)+1}
  function restoreFlag(owner,dropNode){let flag=pieces.find(p=>p.owner===owner&&p.name==='军旗');if(!flag)return;let target=!pieceAt(flag.homeNode)?flag.homeNode:!pieceAt(dropNode)?dropNode:nodes.find(n=>n.type!=='camp'&&!pieceAt(n.id))?.id;flag.dead=false;flag.covered=false;flag.node=target;delete flag.carryingFlag;log(`${owner?'蓝':'红'}方军旗被救回棋盘。`)}
  function carrierLost(carrier,winner,nodeId){if(carrier?.carryingFlag===undefined)return;let flagOwner=carrier.carryingFlag;delete carrier.carryingFlag;if(winner&&!winner.dead&&winner.owner!==flagOwner){winner.carryingFlag=flagOwner;log(`${winner.owner?'蓝':'红'}方接过军旗继续撤离。`)}else restoreFlag(flagOwner,nodeId)}
  function reachedHome(p,id,actor){let n=nodes.find(x=>x.id===id);return p.carryingFlag!==undefined&&n?.type==='hq'&&n.owner===(actor===0?0:1)}
  function move(p,id,actor=p.owner===humanOwner?0:1){let d=pieceAt(id),from=p.node,path=movePath(p,id);lastTrail={owner:p.owner,path};lastBattle=d?id:null;if(!d){p.node=id;moveSound();log(`${p.owner?'蓝方':'红方'}移动一枚棋子。`)}else if(gameMode==='dark'&&d.name==='军旗'){captureSound();d.dead=true;d.covered=false;p.node=id;p.carryingFlag=d.owner;countKill(d);log(`🚩 ${p.owner?'蓝':'红'}方扛起军旗，必须送到${actor===0?'下方':'上方'}任一大本营。`)}else{let r=battle(p,d),attackerFlag=p.carryingFlag,defenderFlag=d.carryingFlag;captureSound();if(r>=0){d.dead=true;countKill(d)}if(r<=0){p.dead=true;countKill(p)}if(r>0)p.node=id;if(defenderFlag!==undefined&&d.dead)carrierLost(d,r>0?p:null,id);if(attackerFlag!==undefined&&p.dead)carrierLost(p,r<0?d:null,id);if(d.name==='司令'&&d.dead)revealFlag(d.owner);if(p.name==='司令'&&p.dead)revealFlag(p.owner);log(`${p.owner?'蓝方':'红方'}发起战斗：${r>0?'进攻获胜':r<0?'进攻失败':'同归于尽'}。`);if(gameMode==='setup'&&d.name==='军旗'&&d.dead){recordFrame(`${p.owner?'蓝方':'红方'}夺取军旗`);return finish(actor===0)}}selected=null;valid=[];
    if(!p.dead&&reachedHome(p,p.node,actor)){recordFrame(`${actor===0?'你':'电脑'}将军旗送回大本营`);return finish(actor===0)}
    recordFrame(d?'发生战斗':'棋子移动');endTurn(actor)}
  function hasMove(owner){return pieces.some(p=>p.owner===owner&&!p.dead&&legal(p).length)}
  function hasAction(actor){if(gameMode==='dark'&&pieces.some(p=>p.covered&&!p.dead))return true;let owner=actor===0?humanOwner:aiOwner;return owner!==null&&hasMove(owner)}
  function endTurn(actor){if(over)return;turn=1-actor;selected=null;valid=[];if(!hasAction(turn))return finish(turn===1);draw();if(turn===1)aiTimer=setTimeout(ai,1100)}
  function ai(){if(over||phase!=='play'||turn!==1)return;let covered=pieces.filter(p=>p.covered&&!p.dead);if(aiOwner===null||covered.length&&Math.random()<.42){return flipPiece(covered[Math.floor(Math.random()*covered.length)],1)}let moves=[];pieces.filter(p=>p.owner===aiOwner&&!p.dead&&!p.covered).forEach(p=>legal(p).forEach(id=>{let n=nodes.find(x=>x.id===id),d=pieceAt(id),score=Math.random()*14+(11-n.y)*1.5;if(p.carryingFlag!==undefined)score+=(11-n.y)*10;if(d){score+=55;if(d.name==='军旗')score+=800;if(d.name==='地雷'&&p.name==='工兵')score+=130;score+=(rank[d.name]||3)*7}moves.push({p,id,score})}));if(!moves.length&&covered.length)return flipPiece(covered[Math.floor(Math.random()*covered.length)],1);if(!moves.length)return finish(true);moves.sort((a,b)=>b.score-a.score);move(moves[0].p,moves[0].id,1)}
  function finish(win){if(over)return;over=true;clearTimeout(aiTimer);phase='over';pieces.forEach(p=>{p.reveal=true;p.covered=false});let before=getCoins(),balance=setCoins(before+(win?200:-100)),delta=balance-before;draw();let list=Object.entries(kills).map(([name,count])=>`${name} × ${count}`).join('、')||'本局未歼灭敌军';$('#resultTitle').textContent=win?'你获胜':'你战败';$('#battleReport').innerHTML=`<b>${win?'🚩 你赢得本局':'🏳️ 本局战斗结束'}</b><br>金币结算：${delta>0?'+':''}${delta} 🪙（余额 ${balance}）<br>歼敌统计：${list}<br>（同归于尽的敌军计入歼敌）`;$('#resultModal').classList.add('show');log(`${win?'你赢得本局':'电脑赢得本局'}，金币${delta>0?'+':''}${delta}。`)}
  function surrender(){if(!over&&phase==='play'&&confirm('确定投降并结束本局吗？'))finish(false)}
  function updateStatus(){let count=o=>pieces.filter(p=>p.owner===o&&!p.dead).length,covered=pieces.filter(p=>p.covered&&!p.dead).length;$('#redCount').textContent=`${count(0)}枚`;$('#blueCount').textContent=`${count(1)}枚`;$('#redLabel').textContent=`🔴 红方${humanOwner===0?'（你）':aiOwner===0?'（电脑）':''}`;$('#blueLabel').textContent=`🔵 蓝方${humanOwner===1?'（你）':aiOwner===1?'（电脑）':''}`;$('#turnText').textContent=phase==='setup'?`布阵中：${pieces.filter(p=>p.owner===0&&p.node).length}/25`:phase==='play'?(turn===0?(gameMode==='dark'&&humanOwner===null?`请翻棋定阵营 · 剩${covered}枚暗子`:'你的回合'):'电脑思考中…'):phase==='over'?'本局结束':'请选择玩法'}
  function log(text){let el=$('#log'),line=document.createElement('div');line.textContent=`${new Date().toLocaleTimeString('zh-CN',{hour12:false,hour:'2-digit',minute:'2-digit'})}  ${text}`;el.appendChild(line);el.scrollTop=el.scrollHeight}
  function recordFrame(caption){if(replayMode||phase==='setup')return;replayFrames.push({caption,pieces:JSON.parse(JSON.stringify(pieces)),turn,lastTrail:lastTrail?JSON.parse(JSON.stringify(lastTrail)):null,lastBattle})}
  function showFrame(i){replayIndex=Math.max(0,Math.min(i,replayFrames.length-1));let f=replayFrames[replayIndex];pieces=JSON.parse(JSON.stringify(f.pieces)).map(p=>({...p,reveal:true,covered:false}));turn=f.turn;lastTrail=f.lastTrail;lastBattle=null;selected=null;valid=[];draw();$('#replayProgress').textContent=`${replayIndex+1}/${replayFrames.length}`;$('#replayCaption').textContent=f.caption;$('#replayPrev').disabled=replayIndex===0;$('#replayNext').disabled=replayIndex===replayFrames.length-1}
  function openReplay(){if(!replayFrames.length)return alert('本局暂无可复盘步骤。');replayReturn={pieces:JSON.parse(JSON.stringify(pieces)),turn,lastTrail,lastBattle};replayMode=true;$('#resultModal').classList.remove('show');$('#replayBar').classList.add('show');showFrame(0)}
  function stopReplay(){clearInterval(replayTimer);replayTimer=null;let b=$('#replayPlay');if(b)b.textContent='播放'}
  function toggleReplay(){if(replayTimer)return stopReplay();$('#replayPlay').textContent='暂停';replayTimer=setInterval(()=>{if(replayIndex>=replayFrames.length-1)return stopReplay();showFrame(replayIndex+1)},900)}
  function exitReplay(){stopReplay();replayMode=false;if(replayReturn){pieces=replayReturn.pieces;turn=replayReturn.turn;lastTrail=replayReturn.lastTrail;lastBattle=replayReturn.lastBattle}$('#replayBar').classList.remove('show');$('#resultModal').classList.add('show');draw()}
  function formations(){try{return JSON.parse(localStorage.getItem('twoArmyFormations')||'[]')}catch(e){return[]}}
  function setFormations(v){localStorage.setItem('twoArmyFormations',JSON.stringify(v))}
  function openFormation(save){if(phase!=='setup')return;$('#formationModal').classList.add('show');$('#formationName').value=save?`阵型${formations().length+1}`:'';renderFormations();if(save)$('#formationName').focus()}
  function renderFormations(){let box=$('#formationList'),data=formations();box.innerHTML='';if(!data.length){box.textContent='还没有保存的阵型';return}data.forEach((f,i)=>{let row=document.createElement('div');row.className='formation-row';row.innerHTML=`<span>${f.name}</span><button data-load="${i}">调入</button><button class="delete" data-delete="${i}">删除</button>`;box.appendChild(row)});box.querySelectorAll('[data-load]').forEach(b=>b.onclick=()=>loadFormation(+b.dataset.load));box.querySelectorAll('[data-delete]').forEach(b=>b.onclick=()=>deleteFormation(+b.dataset.delete))}
  function saveFormation(){if(phase!=='setup'||pieces.some(p=>p.owner===0&&!p.node))return alert('请先完成全部布阵再保存。');let name=$('#formationName').value.trim()||`阵型${formations().length+1}`,data=formations(),item={name,layout:pieces.filter(p=>p.owner===0).map(p=>({name:p.name,node:p.node}))},i=data.findIndex(f=>f.name===name);if(i>=0)data[i]=item;else data.push(item);setFormations(data);renderFormations();log(`已保存阵型“${name}”。`)}
  function loadFormation(i){let f=formations()[i];if(!f)return;let own=pieces.filter(p=>p.owner===0);own.forEach(p=>p.node=null);f.layout.forEach(item=>{let p=own.find(x=>x.name===item.name&&!x.node);if(p)p.node=item.node});setupSelected=null;$('#formationModal').classList.remove('show');draw();log(`已调入阵型“${f.name}”。`)}
  function deleteFormation(i){let data=formations();if(!data[i]||!confirm(`删除阵型“${data[i].name}”吗？`))return;data.splice(i,1);setFormations(data);renderFormations()}
  function enableAudio(){audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}
  function tone(freq,start,len,type='sine',volume=.13){if(!audioCtx)return;let o=audioCtx.createOscillator(),g=audioCtx.createGain(),now=audioCtx.currentTime+start;o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(volume,now);g.gain.exponentialRampToValueAtTime(.001,now+len);o.connect(g);g.connect(audioCtx.destination);o.start(now);o.stop(now+len)}
  function moveSound(){tone(440,0,.12);tone(620,.06,.13)}function captureSound(){tone(180,0,.32,'square',.2);tone(105,.05,.35,'sawtooth',.16)}function horn(){tone(392,0,.25,'sawtooth',.12);tone(523,.2,.3,'sawtooth',.13);tone(659,.45,.4,'sawtooth',.14)}

  document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>startMode(b.dataset.mode));
  $('#modeBtn').onclick=()=>{if(phase==='play'&&!confirm('切换玩法将结束当前棋局，是否继续？'))return;clearTimeout(aiTimer);$('#modeModal').classList.add('show')};
  $('#quickSetup').onclick=quickSetup;$('#confirmSetup').onclick=confirmSetup;$('#saveFormation').onclick=()=>openFormation(true);$('#loadFormation').onclick=()=>openFormation(false);$('#confirmSave').onclick=saveFormation;$('#closeFormation').onclick=()=>$('#formationModal').classList.remove('show');$('#newGame').onclick=()=>startMode(gameMode);$('#surrender').onclick=surrender;$('#playAgain').onclick=()=>startMode(gameMode);$('#backLobby').onclick=()=>location.href='index.html';$('#openReplay').onclick=openReplay;$('#replayPrev').onclick=()=>{stopReplay();showFrame(replayIndex-1)};$('#replayNext').onclick=()=>{stopReplay();showFrame(replayIndex+1)};$('#replayPlay').onclick=toggleReplay;$('#replayExit').onclick=exitReplay;
  $('#rulesBtn').onclick=()=>alert(gameMode==='dark'?'【传统翻棋】\n红蓝各25枚，共50枚，混洗后背面朝上摆满全部兵站和大本营。每回合选择翻开一枚暗子或移动一枚己方明子；阵营确定前只能翻棋。\n\n谁先翻出工兵，谁使用该工兵颜色，另一方使用另一颜色。普通棋子铁路直行不限步，工兵可转弯；公路每次一步；行营内棋子不能被攻击。\n\n只有工兵可以挖地雷。必须清除敌方全部3枚地雷后，任一己方活动棋子才能扛起敌旗；玩家将旗送到下方任一大本营、电脑送到上方任一大本营即获胜。':'【布阵军棋】\n每方25枚棋子。军旗只能放大本营，地雷只能放最后两排，炸弹不能放第一排。\n\n公路每次走一步；铁路无遮挡可直行任意步，工兵可沿铁路转弯。行营中的棋子不能被攻击。军旗、地雷以及进入大本营的棋子不能移动。\n\n司令至工兵依军衔大小吃子；同级同归于尽；炸弹与任何棋子同归于尽；工兵可排雷。夺取敌方军旗或令敌方无棋可走即获胜。');
  $('#landscape').onclick=async()=>{try{await document.documentElement.requestFullscreen?.();await screen.orientation?.lock?.('landscape')}catch(e){alert('请关闭竖屏锁定并横置手机。')}};
  buildMap();setCoins(getCoins());draw();
