function pos(n){return{x:n.x/16*96+2,y:n.y/16*96+2}} function pieceAt(id){return pieces.find(p=>p.node===id&&!p.dead)}

function deployOwner(owner){
  let slots=nodes.filter(n=>n.owner===owner&&n.type!=='camp'),hq=slots.filter(n=>n.type==='hq'),back=slots.filter(n=>n.row>=4),pool=[...names],flag=pool.splice(pool.indexOf('军旗'),1)[0],flagNode=hq[Math.random()<.5?0:1];pieces.push({id:`${owner}-24`,owner,name:flag,node:flagNode.id});let mines=pool.filter(x=>x==='地雷');pool=pool.filter(x=>x!=='地雷');mines.forEach((name,i)=>pieces.push({id:`${owner}-m${i}`,owner,name,node:back.filter(n=>!pieceAt(n.id))[i].id}));pool.sort(()=>Math.random()-.5);pool.forEach((name,i)=>{let opts=slots.filter(n=>!pieceAt(n.id)&&(name!=='炸弹'||n.row!==0)),n=opts[Math.floor(Math.random()*opts.length)];pieces.push({id:`${owner}-p${i}`,owner,name,node:n.id})})

function deploy(){

function shuffle(a){for(let i=a.length-1;i;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function isAlly(a,b){return a===b||(a===0&&b===2)||(a===2&&b===0)||(a===1&&b===3)||(a===3&&b===1)}
function frontRow(owner){return nodes.filter(n=>n.owner===owner&&n.row===0).sort((a,b)=>a.col-b.col)}

function cornerRoutes(n,routes){if(n.owner<0||n.row>4||(n.col!==0&&n.col!==4))return;for(let edge of edges.filter(e=>e[2]==='corner-rail')){let a=nodes.find(x=>x.id===edge[0]),b=nodes.find(x=>x.id===edge[1]);if(a.owner!==n.owner)[a,b]=[b,a];if(a.owner!==n.owner||a.col!==n.col)continue;let side=nodes.filter(x=>x.owner===n.owner&&x.col===n.col&&x.row<=4).sort((x,y)=>x.row-y.row),from=side.findIndex(x=>x.id===n.id),end=side.findIndex(x=>x.id===a.id),step=Math.sign(end-from),path=[n.id],blocked=false;for(let i=from+step;i!==end+step;i+=step){path.push(side[i].id);if(pieceAt(side[i].id)){blocked=true;break}}if(blocked)continue;path.push(b.id);routes.set(b.id,[...path]);if(pieceAt(b.id))continue;let otherSide=nodes.filter(x=>x.owner===b.owner&&x.col===b.col&&x.row<=4).sort((x,y)=>x.row-y.row),start=otherSide.findIndex(x=>x.id===b.id);for(let i=start+1;i<otherSide.length;i++){path.push(otherSide[i].id);routes.set(otherSide[i].id,[...path]);if(pieceAt(otherSide[i].id))break}}}
function railRoutes(p){let n=nodes.find(x=>x.id===p.node),routes=new Map;if(!n?.rail)return routes;if(p.name==='工兵'){let queue=[[n.id,[n.id]]],seen=new Set([n.id]);while(queue.length){let [at,path]=queue.shift();for(let q of railNeighbors(at,['rail','corner-rail'])){if(seen.has(q.id))continue;seen.add(q.id);let next=[...path,q.id];routes.set(q.id,next);if(!pieceAt(q.id))queue.push([q.id,next])}}return routes}for(let first of railNeighbors(n.id,['rail','corner-rail'])){let dx=Math.sign(first.x-n.x),dy=Math.sign(first.y-n.y),at=n,next=first,path=[n.id];while(next){path.push(next.id);routes.set(next.id,[...path]);if(pieceAt(next.id))break;let onward=railNeighbors(next.id,['rail','corner-rail']).filter(x=>x.id!==at.id&&Math.sign(x.x-next.x)===dx&&Math.sign(x.y-next.y)===dy);at=next;next=onward[0]}}cornerRoutes(n,routes);return routes}
function adjacentMoves(p){let n=nodes.find(x=>x.id===p.node),out=edges.filter(e=>e[2]==='road'&&(e[0]===n.id||e[1]===n.id)).map(e=>e[0]===n.id?e[1]:e[0]);out.push(...railRoutes(p).keys());return[...new Set(out)].filter(id=>{let q=pieceAt(id),dest=nodes.find(n=>n.id===id);return(!q||!isAlly(q.owner,p.owner))&&!(q&&dest.type==='camp')})}
function legal(p){let current=nodes.find(n=>n.id===p.node);if(p.name==='地雷'||p.name==='军旗'||current?.type==='hq')return[];return adjacentMoves(p)}
let audioCtx;function enableAudio(){audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}
function captureSound(){if(!audioCtx)return;let now=audioCtx.currentTime,g=audioCtx.createGain();g.connect(audioCtx.destination);g.gain.setValueAtTime(.22,now);g.gain.exponentialRampToValueAtTime(.001,now+.38);[180,110].forEach((freq,i)=>{let o=audioCtx.createOscillator();o.type=i?'sawtooth':'square';o.frequency.setValueAtTime(freq,now+i*.04);o.frequency.exponentialRampToValueAtTime(freq/2,now+.3);o.connect(g);o.start(now+i*.04);o.stop(now+.38)})}
function commanderDeathSound(){if(!audioCtx)return;let now=audioCtx.currentTime,g=audioCtx.createGain();g.connect(audioCtx.destination);g.gain.setValueAtTime(.28,now);g.gain.exponentialRampToValueAtTime(.001,now+1.15);[392,330,262,196].forEach((freq,i)=>{let o=audioCtx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(freq,now+i*.2);o.connect(g);o.start(now+i*.2);o.stop(now+i*.2+.42)})}
function clickNode(id){enableAudio();let p=pieceAt(id),n=nodes.find(x=>x.id===id);if(phase==='setup'){if(n.owner!==0||n.type==='camp')return;if(setupSelected)return placeSetup(setupSelected,id);if(p&&p.owner===0){setupSelected=p.id;draw()}return}if(over||turn!==0)return;if(selected&&valid.includes(id))return move(selected,id);if(p&&p.owner===0){selected=p;valid=legal(p);draw()}else{selected=null;valid=[];draw()}}
function battle(a,d){if(a.name==='炸弹'||d.name==='炸弹')return 0;if(d.name==='地雷')return a.name==='工兵'?1:-1;if(d.name==='军旗')return 1;let x=rank[a.name],y=rank[d.name];return x===y?0:x>y?1:-1}
function revealFlag(owner){let f=pieces.find(x=>x.owner===owner&&x.name==='军旗'&&!x.dead);if(f)f.reveal=true}
function eliminateOwner(owner){pieces.filter(p=>p.owner===owner).forEach(p=>p.dead=true);aliveFlags[owner]=false;log(`🏳️ ${labels[owner]}军旗失守，全军退场`)}
function movePath(p,id){return railRoutes(p).get(id)||[p.node,id]}
function move(p,id){let d=pieceAt(id);if(d&&isAlly(p.owner,d.owner)){selected=null;valid=[];draw();return}lastTrail={owner:p.owner,path:movePath(p,id)};if(!d)p.node=id;else{captureSound();let r=battle(p,d);if(p.owner===0)log(`你发起攻击：${r>0?'获胜':r<0?'失败':'双方同归于尽'}`);if(r>=0)d.dead=true;if(r<=0)p.dead=true;if(r>0)p.node=id;let flagOwner=d.name==='军旗'&&d.dead?d.owner:null;let commanderDied=(d.name==='司令'&&d.dead)||(p.name==='司令'&&p.dead);if(d.name==='司令'&&d.dead)revealFlag(d.owner);if(p.name==='司令'&&p.dead)revealFlag(p.owner);if(commanderDied)commanderDeathSound();if(flagOwner!==null){if(p.owner===0)log('🚩 你夺取了一面敌方军旗！');eliminateOwner(flagOwner)}}selected=null;valid=[];checkWin();nextTurn();draw()}
function teamOf(o){return o%2} function checkWin(){if(!aliveFlags[1]&&!aliveFlags[3])finish(true);if(!aliveFlags[0]&&!aliveFlags[2])finish(false)}
function hasMove(owner){return pieces.some(p=>p.owner===owner&&!p.dead&&legal(p).length)}
function nextTurn(){if(over)return;do{turn=(turn+1)%4}while(!aliveFlags[turn]);if(!hasMove(turn)){log(`⛔ ${labels[turn]}无子可走，军旗视为被俘`);eliminateOwner(turn);checkWin();if(!over)return nextTurn();return draw()}$('#turnText').textContent=turn===0?'红方行动':'电脑思考中…';if(turn!==0)setTimeout(ai,2000)}
function aiScore(move){let target=pieceAt(move.id),dest=nodes.find(n=>n.id===move.id),score=Math.random()*12,focus={1:2,2:3,3:0}[turn];if(target){score+=80+(rank[target.name]||12)*3;if(target.owner===focus)score+=110;if(target.name==='军旗')score+=1000}if(focus!==undefined){let goals=nodes.filter(n=>n.owner===focus&&n.type==='hq'),distance=Math.min(...goals.map(n=>Math.abs(n.x-dest.x)+Math.abs(n.y-dest.y)));score+=(30-distance)*2}let engineers=pieces.filter(p=>p.owner===turn&&p.name==='工兵'&&!p.dead).length,exposedRail=move.p.name==='工兵'&&dest.owner===focus&&dest.row===4&&!target;if(move.p.name==='工兵'&&engineers<=1&&!exposedRail)score-=180;if(exposedRail)score+=240;if(turn===3&&dest.type==='camp')score+=18;return score}
function ai(){if(over)return;let ps=pieces.filter(p=>p.owner===turn&&!p.dead&&legal(p).length),moves=[];ps.forEach(p=>legal(p).forEach(id=>{let target=pieceAt(id);if(!target||!isAlly(p.owner,target.owner))moves.push({p,id,hit:!!target})}));if(!moves.length){log(`⛔ ${labels[turn]}无子可走，军旗视为被俘`);eliminateOwner(turn);checkWin();return over?draw():nextTurn()}moves.forEach(m=>m.score=aiScore(m));moves.sort((a,b)=>b.score-a.score);move(moves[0].p,moves[0].id)}
function log(t){let el=document.createElement('div');el.textContent=t;$('#log').prepend(el)}
function getCoins(){let value=parseInt(localStorage.getItem('cloudCoins')||'1000',10);return Number.isFinite(value)?Math.max(0,value):1000}
function setCoins(value){value=Math.max(0,value);localStorage.setItem('cloudCoins',String(value));$('#coinCount').textContent=value;return value}
function finish(win){over=true;let delta=win?300:-200,balance=getCoins();if(!settled){balance=setCoins(balance+delta);settled=true}$('#resultTitle').textContent=win?'红紫联盟获胜！':'蓝绿联盟获胜';$('#resultText').textContent=`${win?'获得 300':'失去 200'} 金币，当前余额 ${balance} 金币。`;$('#result').classList.add('show')}
function surrender(){if(over)return;if(!confirm('确定投降吗？本局将立即失败并扣除 200 金币。'))return;eliminateOwner(0);draw();finish(false)}
function start(){buildMap();deploy();phase='setup';turn=0;selected=null;setupSelected=null;lastTrail=null;valid=[];aliveFlags=[true,true,true,true];over=false;settled=false;setCoins(getCoins());$('#result').classList.remove('show');$('#setupActions').classList.remove('hidden');$('#log').innerHTML='';log('请从左下方托盘拖动棋子完成布阵，也可点击“快速布阵”。');draw();updateSetupText()}
$('#surrender').onclick=surrender;$('#quickSetup').onclick=quickSetup;$('#confirmSetup').onclick=confirmSetup;$('#restart').onclick=start;$('#rulesBtn').onclick=()=>alert('侧边竖铁路前五点与邻家侧边竖铁路前五点连续相通，遇到第一枚棋子立即停止。普通棋子不能借连接点转入邻家第一排，工兵可以在所有铁路交叉点自由转向。军旗被夺或无子可走时，该方全部棋子退场。');$('#landscape').onclick=async()=>{try{await document.documentElement.requestFullscreen?.();await screen.orientation?.lock?.('landscape')}catch(e){alert('请关闭竖屏锁定并横置手机')}};start();
</script></body></html>
