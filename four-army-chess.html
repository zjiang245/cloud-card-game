<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title id="pageTitle">云上四国军棋</title>
  <style>
    /* ==================== 1. 页面基础布局 ====================
       main 分为顶部工具栏和游戏主体；主体再分为棋盘和右侧信息栏。 */
    *{box-sizing:border-box}body{margin:0;min-height:100vh;overflow:hidden;color:#eee2c5;font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#07100d}
    main{height:100vh;background:radial-gradient(circle at center,#294e3e,#10281f 60%,#050b09);display:grid;grid-template-rows:58px 1fr}
    header{display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:#030907d9;border-bottom:1px solid #9d79443d}a{color:#d7bd89;text-decoration:none}.title{font:700 22px "KaiTi",serif;color:#ffe1a0;letter-spacing:4px}.tools{display:flex;gap:8px}.tools button{padding:7px 11px;border:1px solid #9f783e;border-radius:16px;background:#21160e;color:#ead5a6}

    /* ==================== 2. 棋盘、道路与落子点 ====================
       .road 是公路；.rail/.corner-rail 是铁路；.node 是可站立的格点。 */
    .layout{min-height:0;display:grid;grid-template-columns:minmax(280px,1fr) 260px;gap:12px;padding:10px}.board-wrap{min-height:0;display:grid;place-items:center}.board{position:relative;width:min(78vh,72vw);aspect-ratio:1;background:#d6bc85;border:10px solid #573a20;border-radius:9px;box-shadow:0 18px 50px #000b,inset 0 0 35px #795c31}
    .board:before,.board:after{content:"";position:absolute;background:#315f4c55}.board:before{left:38%;right:38%;top:0;bottom:0}.board:after{top:38%;bottom:38%;left:0;right:0}
    .road{position:absolute;height:2px;background:#69563b;transform-origin:left center;z-index:1}.road.rail,.road.corner-rail{height:4px;background:#252b27;box-shadow:0 2px 0 #c8a86f}.road.corner-rail{height:5px}
    .node{position:absolute;z-index:3;width:5.8%;height:5.8%;aspect-ratio:1;transform:translate(-50%,-50%);padding:0;border:1px solid #755f3d;border-radius:4px;background:#ead9ad;display:grid;place-items:center;font-size:clamp(7px,1.2vw,13px);font-weight:800;color:#2d2419;cursor:pointer;transition:.15s}.node.rail{border:2px solid #4f5348}.node.camp{transform:translate(-50%,-50%) rotate(45deg);border-color:#3f795e;background:#d2deb9}.node.camp>*{transform:rotate(-45deg)}.node.hq{border-radius:50%;background:#e4c588}.node.valid{box-shadow:0 0 0 3px #74e5a0,0 0 15px #48e48a}.node.selected{box-shadow:0 0 0 3px #ffe36d;transform:translate(-50%,-50%) scale(1.08)}.node.setup-target{border-color:#c3483e}.node.setup-target:hover{box-shadow:0 0 0 3px #ffd669}

    /* ==================== 3. 棋子与棋盘内控件 ====================
       包含四色棋子、暗棋外观、放大字体、结束/投降按钮、轨迹箭头和战斗闪框。 */
    .piece{position:relative;width:calc(100% + 4px);aspect-ratio:1;height:auto;border-radius:3px;display:grid;place-items:center;color:white;text-shadow:0 1px 2px #000;font-size:inherit;line-height:1;cursor:pointer;user-select:none;touch-action:none}.piece.large-label{font-size:clamp(20px,3.6vw,42px);font-family:"STKaiti","KaiTi",serif;font-weight:900;line-height:.9}.red{background:#b43c32}.blue{background:#355eae}.purple{background:#7948a7}.green{background:#39835b}.piece.marshal{border:4px solid #ffd74a;background:#b43c32;box-shadow:inset 0 0 9px #fff0a2,0 0 12px #ffd329;color:#fff6bc;text-shadow:0 2px 3px #5a2400}.hidden-piece{color:transparent;border:1px solid #eadcad;text-shadow:none}.hidden-piece.blue{background:#355eae}.hidden-piece.purple{background:#7948a7}.hidden-piece.green{background:#39835b}.piece-mark{position:absolute;left:7%;top:7%;width:86%;height:86%;padding:0;border:3px solid #ffea61;border-radius:8px;display:grid;place-items:center;background:#18251ef2;color:#fff7a7!important;text-shadow:0 2px 3px #000;font:900 clamp(14px,2.3vw,30px) "KaiTi",serif;box-shadow:inset 0 0 8px #ffe73f,0 0 9px #ffe73f;z-index:4}.font-toggle{position:absolute;z-index:12;right:4%;top:1.5%;width:24%;height:12%;border:4px solid #1ca5ef;border-radius:13px;background:#f5dfaaeb;color:#173e55;font-weight:900;font-size:clamp(14px,2vw,25px);cursor:pointer;box-shadow:0 7px 18px #0004}.font-toggle.active{background:#167bb6;color:white}.cheat-panel{position:absolute;z-index:12;right:4%;top:14.5%;width:24%;padding:7px 11px;border:4px solid #e5534b;border-radius:13px;background:#351411e8;color:#ffe2ad;box-shadow:0 7px 18px #0005}.cheat-panel h3{margin:0 0 4px;font-size:clamp(12px,1.65vw,21px);color:#ff9d73;white-space:nowrap}.cheat-panel label{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:clamp(10px,1.25vw,16px);line-height:1.1;cursor:pointer}.cheat-panel input{width:17px;height:17px;margin:0;accent-color:#e5483f}.marker-panel{position:absolute;z-index:12;left:4%;top:4%;width:25%;min-height:28%;padding:10px 12px;border:4px solid #72c900;border-radius:12px;background:#18301ee8;color:#ecffd0;box-shadow:0 7px 18px #0005}.marker-panel h3{margin:0 0 7px;color:#b8ff59;font-size:clamp(13px,1.7vw,22px)}.marker-panel p{margin:5px 0 8px;font-size:clamp(8px,1vw,13px);line-height:1.35}.marker-panel select,.marker-panel button{width:100%;margin-top:6px;padding:7px 6px;border:1px solid #91c94a;border-radius:8px;background:#e9f6c8;color:#183214;font-weight:800;font-size:clamp(9px,1.15vw,15px)}.marker-panel button{cursor:pointer}.marker-panel button.active{background:#6fb72d;color:#fff}.marker-panel .clear-marks{background:#684039;color:#ffe1d3;border-color:#a76658}.board-actions{position:absolute;z-index:12;right:4%;bottom:3%;width:24%;height:28%;display:grid;grid-template-rows:repeat(3,1fr);gap:7px}.board-actions button{border:3px solid #c59b52;border-radius:10px;background:#201b14dd;color:#ffe1a7;font:900 clamp(12px,1.55vw,20px) "KaiTi",serif;cursor:pointer;box-shadow:0 6px 16px #0005}.board-actions .surrender{border-color:#e65b4f;background:#57201bdd;color:white}.board-actions .skip-turn{border-color:#6ea6c7;background:#17394ddd;color:#cceeff}.board-actions button:disabled{cursor:not-allowed;filter:grayscale(1);opacity:.48}.board-actions button:not(:disabled):hover{filter:brightness(1.35)}.trail-arrow{position:absolute;z-index:8;width:3.2%;aspect-ratio:1;display:grid;place-items:center;border-radius:50%;background:#fff2a9dc;color:#7c261e;font-size:clamp(8px,1.15vw,15px);font-weight:900;pointer-events:none;box-shadow:0 0 6px #0008}.trail-arrow.start{background:#ffe36d;color:#5c2917;box-shadow:0 0 0 2px #fff2a1,0 0 10px #ffdc3f}.battle-flash{position:absolute;z-index:9;width:6.7%;aspect-ratio:1;transform:translate(-50%,-50%);border:4px solid #ffe33f;border-radius:8px;pointer-events:none;animation:battleBlink .45s infinite alternate;box-shadow:0 0 14px #ffd91a}@keyframes battleBlink{to{opacity:.18;transform:translate(-50%,-50%) scale(1.12)}}.setup-selected{outline:3px solid #ffe36d;box-shadow:0 0 14px #ffd54f}.setup-tray{position:absolute;z-index:6;left:2%;top:67%;width:31%;aspect-ratio:1;padding:5px;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:3px;border:3px solid #e34d42;border-radius:7px;background:#cbae7288}.setup-tray.hidden{display:none}.tray-cell{min-width:0;min-height:0;display:grid;place-items:center}.tray-piece{width:100%;height:100%;aspect-ratio:1;border:1px solid #f0cf9b;border-radius:4px;font-size:clamp(6px,.85vw,10px);font-weight:800}.tray-piece.large-label{font-size:clamp(15px,2.4vw,28px)}.difficulty{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:8px 0}.difficulty.hidden{display:none}.difficulty button{padding:7px 3px;border:1px solid #8b734d;border-radius:14px;background:#171b18;color:#c8b990;font-weight:800}.difficulty button[data-level="hell"]{color:#ff9b8b;border-color:#9f3c36}.difficulty button.active{border-color:#ffd46c;background:#73501d;color:#fff1bd}.difficulty button[data-level="hell"].active{background:#8d201b;color:#fff}.setup-actions,.formation-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}.setup-actions.hidden,.formation-actions.hidden{display:none}.setup-action,.formation-action{padding:10px 6px;border:0;border-radius:18px;background:linear-gradient(#ffe18a,#c98b2e);color:#3a2108;font-weight:900;cursor:pointer}.quick-setup{background:linear-gradient(#b8e4bd,#4d9b61)}.formation-action{background:linear-gradient(#add9ee,#4d86a8);color:#102b3a}.dead{opacity:.2}.flag-reveal{animation:flash .7s infinite alternate}@keyframes flash{to{box-shadow:0 0 18px #fff06c}}

    /* ==================== 4. 右侧信息栏与结算弹窗 ==================== */
    aside{padding:15px;border:1px solid #9f783e55;border-radius:12px;background:#090f0cbb;overflow:auto}.turn{font:700 18px "KaiTi",serif;color:#ffe09a}.coin-box{margin:8px 0;padding:8px 11px;border:1px solid #d4a95755;border-radius:9px;background:#20170c;color:#ffd77e;font-weight:800}.teams{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:12px 0}.team{padding:8px;border-radius:7px;background:#ffffff09;font-size:12px}.log{height:240px;overflow:auto;padding:9px;border-radius:8px;background:#0005;font-size:12px;line-height:1.7}.rules{font-size:12px;color:#b9c4ba;line-height:1.65}.result,.intro-modal,.formation-modal{position:fixed;z-index:20;inset:0;display:none;place-items:center;background:#000b}.result.show,.intro-modal.show,.formation-modal.show{display:grid}.result>div,.intro-card,.formation-card{width:min(430px,90vw);max-height:82vh;overflow:auto;padding:24px 28px;border:1px solid #d1a654;border-radius:14px;background:#180f0c;text-align:center;box-shadow:0 18px 50px #000b}.result button,.intro-card button,.formation-card button{padding:9px 16px;border:0;border-radius:18px;background:#d19a45;font-weight:700;cursor:pointer}.intro-card h2,.formation-card h2{margin:0 0 14px;color:#ffe2a0}.intro-list{display:grid;gap:8px;margin-bottom:16px;text-align:left}.intro-list div{padding:8px 12px;border-radius:8px;background:#ffffff0c}.intro-list b{display:inline-block;width:48px;color:#ffd36f}.formation-save{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:14px}.formation-save input{min-width:0;padding:10px 12px;border:1px solid #a9844d;border-radius:10px;background:#0d1712;color:#fff;font-size:16px}.formation-list{display:grid;gap:8px;text-align:left}.formation-empty{padding:18px;color:#bcae90}.formation-row{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center;padding:8px;border:1px solid #795c35;border-radius:9px;background:#ffffff08}.formation-row span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.formation-row .load-one{background:#68a8ca;color:#102638}.formation-row .delete-one{background:#8e332d;color:#fff}.formation-close{margin-top:14px;background:#5d574c!important;color:#fff}

    /* ==================== 5. 手机竖屏与手机横屏适配 ==================== */
    @media(max-width:800px){body{overflow:auto}main{height:auto;min-height:100dvh;grid-template-rows:auto 1fr}header{min-height:82px;flex-wrap:wrap;padding:8px}.title{font-size:18px}.layout{display:flex;flex-direction:column;padding:5px}.board{width:min(96vw,76vh)}.piece.large-label{font-size:clamp(9px,2.8vw,14px);line-height:1}.tray-piece.large-label{font-size:clamp(8px,2.5vw,12px)}aside{width:96vw;margin:auto}.log{height:110px}.tools{overflow-x:auto}.tools button{flex:0 0 auto;font-size:11px}}
    @media(orientation:landscape) and (max-height:600px){main{height:100dvh;grid-template-rows:45px 1fr}header{min-height:45px}.layout{display:grid;grid-template-columns:1fr 210px}.board{width:min(82vh,70vw)}aside{width:auto;padding:8px}.log{height:105px}.rules{font-size:10px}.title{font-size:16px}}
  </style>
</head>
<body><main>
  <!-- 顶部工具栏：返回大厅、横屏、规则说明和重新布阵 -->
  <header><a href="index.html">← 游戏大厅</a><div class="title" id="gameTitle">云上四国军棋 · 暗棋模式</div><div class="tools"><button id="landscape">↻ 横屏</button><button id="rulesBtn">规则说明</button><button id="restart">重新布阵</button></div></header>
  <!-- 游戏主体：左侧动态生成棋盘，右侧显示回合、金币、难度、阵营和日志 -->
  <div class="layout"><div class="board-wrap"><div class="board" id="board"></div></div><aside>
    <div class="turn" id="turnText">请布置红方棋子</div><div class="coin-box">🪙 大厅金币：<span id="coinCount">0</span></div><div class="difficulty" id="difficulty"><button data-level="easy">简单</button><button data-level="normal">一般</button><button data-level="hard">困难</button><button data-level="hell">地狱</button></div><div class="setup-actions" id="setupActions"><button class="setup-action quick-setup" id="quickSetup">快速布阵</button><button class="setup-action" id="confirmSetup">确认布阵</button></div><div class="formation-actions" id="formationActions"><button class="formation-action" id="saveFormation">保存阵型</button><button class="formation-action" id="loadFormation">调用阵型</button></div><div class="teams"><div class="team" id="teamRed"></div><div class="team" id="teamPurple"></div><div class="team" id="teamBlue"></div><div class="team" id="teamGreen"></div></div>
    <div class="log" id="log"></div><div class="rules" id="rules">侧边铁路：本方侧边前五点与邻家侧边前五点连续相通，遇到棋子立即停止；普通棋子不能转入邻家第一排，工兵可在铁路交叉点转向。</div>
  </aside></div>
  <!-- 游戏结束时覆盖全屏显示的结算弹窗 -->
  <div class="result" id="result"><div><h2 id="resultTitle"></h2><p id="resultText"></p><button onclick="start()">再来一局</button></div></div>
  <!-- 每次开局显示的难度速览；每条说明不超过十个汉字。 -->
  <div class="intro-modal" id="introModal"><div class="intro-card"><h2>难度速览</h2><div class="intro-list"><div><b>简单</b>红紫对蓝绿</div><div><b>一般</b>紫清空战两家</div><div><b>困难</b>紫中立三方战</div><div><b>地狱</b>红方一打三</div></div><button id="closeIntro">开始布阵</button></div></div>
  <!-- 页面内置阵型管理器，避免 file:// 环境不显示原生 prompt 输入框。 -->
  <div class="formation-modal" id="formationModal"><div class="formation-card"><h2>我的阵型</h2><div class="formation-save"><input id="formationName" maxlength="16" placeholder="输入阵型名称"><button id="confirmSaveFormation">保存当前阵型</button></div><div class="formation-list" id="formationList"></div><button class="formation-close" id="closeFormation">关闭</button></div></div>
</main><script>
/* ========================================================================
   四国军棋主程序阅读导航
   1. 常量与全局状态
   2. 棋盘数据建模
   3. 页面绘制
   4. 标准/乱战布阵
   5. 铁路寻路与合法走法
   6. 音效、点击与战斗结算
   7. 电脑战斗记忆与评分
   8. 回合、胜负、金币和按钮事件

   核心数据结构：
   - nodes：所有棋盘格点。owner 0/1/2/3 分别表示红/蓝/紫/绿，-1 表示中央区。
   - edges：[起点ID, 终点ID, 道路类型]，道路类型为 road、rail 或 corner-rail。
   - pieces：棋子对象数组，主要字段为 id、owner、name、node、dead、reveal。
   ======================================================================== */

// ==================== 1. 常量与全局状态 ====================

// 标准四国军棋中，每一方拥有的25枚棋子。
const names=['司令','军长','师长','师长','旅长','旅长','团长','团长','营长','营长','连长','连长','连长','排长','排长','排长','工兵','工兵','工兵','炸弹','炸弹','地雷','地雷','地雷','军旗'];

// 普通棋子的比较等级；炸弹、地雷和军旗在 battle() 中单独处理。
const rank={'元帅':10,'司令':9,'军长':8,'师长':7,'旅长':6,'团长':5,'营长':4,'连长':3,'排长':2,'工兵':1}, colors=['red','blue','purple','green'], labels=['红方','蓝方','紫方','绿方'];

// URL 带 ?mode=chaos 时启用“乱战随机分兵”模式。
const chaosMode=new URLSearchParams(location.search).get('mode')==='chaos';

/* 运行状态：
   turn：当前行动方；phase：setup 布阵 / play 对局；
   selected、valid：玩家当前选中的棋子和可走目标；
   aliveFlags：四方是否仍在场；aiOrders：三方电脑记住的特殊追击任务。 */
let nodes=[],edges=[],pieces=[],turn=0,selected=null,valid=[],aliveFlags=[true,true,true,true],over=false,phase='setup',setupSelected=null,draggedPiece=null,lastTrail=null,lastBattle=null,settled=false,purpleSafeTurns=0,purpleAttacked=false,hardRedBreach=false,redSurrendered=false,aiTimer=null,aiOrders={1:null,2:null,3:null},cheats={platoonToCommander:false,companyToBomb:false,marshal:false},marshalFallen=false,markingEnabled=false,markGuess='司令';

// 常用 DOM、难度设置和“大字体单字显示”配置。
const $=s=>document.querySelector(s),board=$('#board');
let difficulty=localStorage.getItem('armyDifficulty')||'easy';
if(!['easy','normal','hard','hell'].includes(difficulty))difficulty='easy';
const shortName={'元帅':'帅','司令':'司','军长':'军','师长':'师','旅长':'旅','团长':'团','营长':'营','连长':'连','排长':'排','工兵':'兵','炸弹':'弹','地雷':'雷','军旗':'旗'};
let largeFont=localStorage.getItem('armyLargeFont')==='1';

// 根据字体模式返回“司令”或“司”这样的显示文字。
function pieceLabel(name){return largeFont?shortName[name]:name}

// 更新简单/一般/困难/地狱四个按钮的选中样式和阵营说明。
function updateDifficulty(){document.querySelectorAll('#difficulty button').forEach(b=>b.classList.toggle('active',b.dataset.level===difficulty));updateModeInfo()}

// 四种难度同时代表四套阵营关系，布阵时在右侧实时展示。
function updateModeInfo(){
  const info={
    easy:['🔴 红方（你）<br>盟友：紫方','🟣 紫方<br>盟友：红方','🔵 蓝方<br>盟友：绿方','🟢 绿方<br>盟友：蓝方','简单：沿用原困难电脑，红紫联盟对抗蓝绿联盟。'],
    normal:['🔴 红方（你）<br>独自对抗蓝绿','🟣 紫方<br>开局清空','🔵 蓝方<br>盟友：绿方','🟢 绿方<br>盟友：蓝方','一般：紫方开局退场，红方25枚对抗蓝绿共50枚。'],
    hard:['🔴 红方（你）<br>对抗蓝绿','🟣 紫方<br>完全中立，任何方都可交战','🔵 蓝方<br>盟友：绿方','🟢 绿方<br>盟友：蓝方','困难：红方对抗蓝绿联盟；紫方不加入任何联盟。'],
    hell:['🔴 红方（你）<br>孤军对抗三家','🟣 紫方<br>盟友：蓝方、绿方','🔵 蓝方<br>盟友：紫方、绿方','🟢 绿方<br>盟友：蓝方、紫方','地狱：蓝、绿、紫三家联盟，围攻红方。']
  }[difficulty];
  ['#teamRed','#teamPurple','#teamBlue','#teamGreen'].forEach((id,i)=>$(id).innerHTML=info[i]);
  $('#rules').textContent=info[4];
}

// ==================== 2. 棋盘数据建模 ====================

// 把二维坐标转换为唯一字符串ID，并按坐标查找格点。
function key(x,y){return `${x},${y}`} function nodeAt(x,y){return nodes.find(n=>n.x===x&&n.y===y)}

/**
 * 向棋盘加入一个格点。
 * @param {number} owner 归属方：0红、1蓝、2紫、3绿、-1中央。
 * @param {string} type post普通点、camp行营、hq大本营、center中央点。
 * @param {boolean} rail 该点是否位于铁路上。
 */
function addNode(x,y,owner,row,col,type='post',rail=false){if(nodeAt(x,y))return;nodes.push({id:key(x,y),x,y,owner,row,col,type,rail})}

/**
 * 创建整张棋盘的格点和道路连接。
 * 四家区域分别旋转放置；中央建立九宫格铁路；四角再接上侧边铁路。
 */
function buildMap(){
  nodes=[];edges=[];
  const camps=['1,1','1,3','2,2','3,1','3,3'];
  for(let r=0;r<6;r++)for(let c=0;c<5;c++){addNode(6+c,11+r,0,r,c,camps.includes(`${r},${c}`)?'camp':r===5&&(c===1||c===3)?'hq':'post',r===0||r===4||c===0||c===4)}
  for(let r=0;r<6;r++)for(let c=0;c<5;c++){addNode(5-r,6+c,1,r,c,camps.includes(`${r},${c}`)?'camp':r===5&&(c===1||c===3)?'hq':'post',r===0||r===4||c===0||c===4)}
  for(let r=0;r<6;r++)for(let c=0;c<5;c++){addNode(6+c,5-r,2,r,c,camps.includes(`${r},${c}`)?'camp':r===5&&(c===1||c===3)?'hq':'post',r===0||r===4||c===0||c===4)}
  for(let r=0;r<6;r++)for(let c=0;c<5;c++){addNode(11+r,6+c,3,r,c,camps.includes(`${r},${c}`)?'camp':r===5&&(c===1||c===3)?'hq':'post',r===0||r===4||c===0||c===4)}
  for(let y=6;y<=10;y+=2)for(let x=6;x<=10;x+=2)addNode(x,y,-1,0,0,'center',true);
  let seen=new Set();for(let a of nodes)for(let b of nodes){let d=Math.abs(a.x-b.x)+Math.abs(a.y-b.y),linked=d===1||(a.type==='camp'&&Math.abs(a.x-b.x)===1&&Math.abs(a.y-b.y)===1);if(!linked)continue;let pair=[a.id,b.id].sort(),id=pair.join('|');if(seen.has(id))continue;seen.add(id);let backRoad=a.owner===b.owner&&a.owner>=0&&Math.min(a.row,b.row)===4&&Math.max(a.row,b.row)===5;edges.push([pair[0],pair[1],!backRoad&&a.rail&&b.rail?'rail':'road'])}

  [[armyNode(0,0,0),armyNode(1,0,4)],[armyNode(1,0,0),armyNode(2,0,0)],[armyNode(2,0,4),armyNode(3,0,0)],[armyNode(3,0,4),armyNode(0,0,4)]].forEach(([a,b])=>edges.push([a,b,'corner-rail']));
}

// 将逻辑坐标换成棋盘中的百分比位置；pieceAt() 返回指定格点上的存活棋子。

// 给布阵棋子绑定点击互换和拖动事件。

/**

  if(phase==='play'&&!over){let actions=document.createElement('div'),endButton=document.createElement('button');actions.className='board-actions';endButton.textContent='结束游戏';endButton.onclick=endGame;actions.appendChild(endButton);if(!redSurrendered){let surrenderButton=document.createElement('button');surrenderButton.className='surrender';surrenderButton.textContent='投降';surrenderButton.onclick=surrender;actions.appendChild(surrenderButton)}let skipButton=document.createElement('button');skipButton.className='skip-turn';skipButton.textContent='跳过回合';skipButton.disabled=turn!==0||!aliveFlags[0];skipButton.onclick=skipTurn;actions.appendChild(skipButton);board.appendChild(actions)}
  if(lastTrail){lastTrail.path.slice(0,-1).forEach((id,i)=>{let n=nodes.find(x=>x.id===id),next=nodes.find(x=>x.id===lastTrail.path[i+1]);if(!n||!next)return;let at=pos(n),angle=Math.atan2(next.y-n.y,next.x-n.x)*180/Math.PI,el=document.createElement('span');el.className=`trail-arrow ${i===0?'start':''}`;el.textContent='➤';el.style.cssText=`left:${at.x}%;top:${at.y}%;transform:translate(-50%,-50%) rotate(${angle}deg);color:${['#8e211a','#173f8a','#603080','#17613a'][lastTrail.owner]}`;board.appendChild(el)});if(lastBattle){let n=nodes.find(x=>x.id===lastBattle);if(n){let at=pos(n),el=document.createElement('span');el.className='battle-flash';el.style.cssText=`left:${at.x}%;top:${at.y}%`;board.appendChild(el)}}}
  nodes.filter(n=>n.type!=='transit').forEach(n=>{let p=pos(n),el=document.createElement('button'),pc=pieceAt(n.id),setupTarget=phase==='setup'&&n.owner===0&&n.type!=='camp';el.className=`node ${n.type} ${n.rail?'rail':''} ${valid.includes(n.id)?'valid':''} ${selected?.node===n.id?'selected':''} ${setupTarget?'setup-target':''}`;el.style.cssText=`left:${p.x}%;top:${p.y}%`;el.dataset.id=n.id;if(pc){let hidden=pc.owner!==0&&!pc.reveal&&!(redSurrendered&&pc.owner===2),mark=pc.mark?`<i class="piece-mark">${shortName[pc.mark]||pc.mark}</i>`:'';el.innerHTML=`<span class="piece ${colors[pc.owner]} ${pc.name==='元帅'?'marshal':''} ${hidden?'hidden-piece':''} ${largeFont&&!hidden?'large-label':''} ${pc.reveal?'flag-reveal':''} ${setupSelected===pc.id?'setup-selected':''}">${hidden?'':pieceLabel(pc.name)}${mark}</span>`;if(phase==='setup'&&pc.owner===0)bindSetupPiece(el.firstElementChild,pc)}else if(n.type==='camp')el.innerHTML='<span>营</span>';else if(n.type==='hq')el.textContent='本营';el.onclick=()=>clickNode(n.id);if(setupTarget){el.ondragover=e=>e.preventDefault();el.ondrop=e=>{e.preventDefault();placeSetup(e.dataTransfer.getData('text/plain')||draggedPiece,n.id)}}board.appendChild(el)})

// ==================== 4. 标准模式与乱战模式布阵 ====================

/**
 * 为一方电脑生成标准25枚棋子的合法随机阵型。
 * 电脑规则：军旗进大本营、地雷在后两排、炸弹不在第一排；
 * 工兵第一排最多一个，其余工兵靠后保留。
 */
function deployOwner(owner){
  let slots=nodes.filter(n=>n.owner===owner&&n.type!=='camp'),hq=slots.filter(n=>n.type==='hq'),back=slots.filter(n=>n.row>=4),pool=[...names],place=(name,filter,id)=>{let opts=slots.filter(n=>!pieceAt(n.id)&&filter(n)),n=opts[Math.floor(Math.random()*opts.length)];pieces.push({id,owner,name,node:n.id});pool.splice(pool.indexOf(name),1)};
  place('军旗',n=>n.type==='hq',`${owner}-flag`);
  for(let i=0;i<3;i++)place('地雷',n=>n.row>=4,`${owner}-mine${i}`);
  for(let i=0;i<2;i++)place('炸弹',n=>n.row!==0,`${owner}-bomb${i}`);
  place('工兵',n=>n.row===0,`${owner}-engineer0`);
  for(let i=1;i<3;i++)place('工兵',n=>n.row>=2,`${owner}-engineer${i}`);
  shuffle([...pool]).forEach((name,i)=>place(name,()=>true,`${owner}-p${i}`));
}

/**
 * 修正乱战模式随机分到的手牌：
 * 多余军旗变军长；没有军旗则把最小棋子变军旗；第10枚起的地雷变团长。
 */
function normalizeChaosHand(hand){
  let flags=hand.map((name,i)=>name==='军旗'?i:-1).filter(i=>i>=0);
  flags.slice(1).forEach(i=>hand[i]='军长');
  if(!flags.length){let candidates=hand.map((name,i)=>({i,value:rank[name]??(name==='地雷'?10:name==='炸弹'?11:12)})).sort((a,b)=>a.value-b.value);hand[candidates[0].i]='军旗'}
  let mines=hand.map((name,i)=>name==='地雷'?i:-1).filter(i=>i>=0);
  mines.slice(9).forEach(i=>hand[i]='团长');
  return hand;
}

// 洗混100枚棋子并分成四手；最多尝试500次，避免生成无法合法布阵的组合。
function makeChaosHands(){
  for(let tries=0;tries<500;tries++){
    let pool=shuffle(Array.from({length:4},()=>names).flat()),hands=[0,1,2,3].map(owner=>normalizeChaosHand(pool.slice(owner*25,owner*25+25)));
    if(hands.every(h=>{let mines=h.filter(x=>x==='地雷').length,bombs=h.filter(x=>x==='炸弹').length;return mines<=9&&bombs<=19-mines}))return hands;
  }
  return [0,1,2,3].map(()=>[...names]);
}

// 将乱战模式中某个电脑分到的25枚棋子放进其棋盘区域。
function deployChaosOwner(owner,hand){
  let slots=nodes.filter(n=>n.owner===owner&&n.type!=='camp'),hq=slots.filter(n=>n.type==='hq'),back=slots.filter(n=>n.row>=4),remaining=[...hand],place=(name,filter,id)=>{let opts=slots.filter(n=>!pieceAt(n.id)&&filter(n)),n=opts[Math.floor(Math.random()*opts.length)];pieces.push({id,owner,name,node:n.id});remaining.splice(remaining.indexOf(name),1)};
  place('军旗',n=>n.type==='hq',`${owner}-chaos-flag`);
  let mineCount=remaining.filter(x=>x==='地雷').length;for(let i=0;i<mineCount;i++)place('地雷',n=>n.row>=4,`${owner}-chaos-mine${i}`);
  let bombCount=remaining.filter(x=>x==='炸弹').length;for(let i=0;i<bombCount;i++)place('炸弹',n=>n.row!==0,`${owner}-chaos-bomb${i}`);
  let engineerCount=remaining.filter(x=>x==='工兵').length;
  if(engineerCount)place('工兵',n=>n.row===0,`${owner}-chaos-engineer0`);
  for(let i=1;i<Math.min(engineerCount,3);i++)place('工兵',n=>n.row>=2,`${owner}-chaos-engineer${i}`);
  for(let i=3;i<engineerCount;i++)place('工兵',n=>n.row!==0,`${owner}-chaos-engineer${i}`);
  shuffle([...remaining]).forEach((name,i)=>place(name,()=>true,`${owner}-chaos-${i}`));
}

// 根据当前模式创建四家的棋子：红方留在托盘等待玩家布阵，三方电脑自动布阵。
function deploy(){
  if(chaosMode){let hands=makeChaosHands();pieces=hands[0].map((name,i)=>({id:`0-chaos-${i}`,owner:0,name,node:null}));for(let owner=1;owner<4;owner++)deployChaosOwner(owner,hands[owner]);return}
  pieces=names.map((name,i)=>({id:`0-${i}`,owner:0,name,node:null}));for(let owner=1;owner<4;owner++)deployOwner(owner)
}

// ==================== 标准模式作弊器 ====================

/**
 * 开关一项作弊器。乱战模式下此函数直接拒绝执行。
 * 排长/连长会保留 cheatedFrom 标记，因此关闭开关时可以恢复原棋种。
 */
function toggleCheat(type,enabled){
  if(chaosMode||over)return;
  if(type==='marshal'&&enabled){
    if(marshalFallen){cheats.marshal=false;draw();return alert('本局元帅已经阵亡，不能再次生成。')}
    if(pieces.some(p=>p.id==='0-cheat-marshal'&&!p.dead)){cheats.marshal=true;draw();return}
    let camp=nodes.find(n=>n.owner===0&&n.row===2&&n.col===2&&n.type==='camp');
    if(!camp||pieceAt(camp.id)){cheats.marshal=false;draw();return alert('红方第三排中央行营已有棋子，暂时无法增加元帅。')}
    pieces.push({id:'0-cheat-marshal',owner:0,name:'元帅',node:camp.id,cheatPiece:true});
  }else if(type==='marshal'&&!enabled){
    pieces=pieces.filter(p=>p.id!=='0-cheat-marshal');
  }else{
    let original=type==='platoonToCommander'?'排长':'连长',replacement=type==='platoonToCommander'?'司令':'炸弹';
    pieces.filter(p=>p.owner===0).forEach(p=>{
      if(enabled&&p.name===original&&!p.cheatedFrom){p.cheatedFrom=original;p.name=replacement}
      else if(!enabled&&p.cheatedFrom===original){p.name=original;delete p.cheatedFrom}
    });
  }
  cheats[type]=enabled;selected=null;valid=[];draw();updateSetupText();
  log(`🎛️ 作弊器：${{platoonToCommander:'排长变司令',companyToBomb:'连长变炸弹',marshal:'增加元帅'}[type]}已${enabled?'开启':'关闭'}`);
}

// 把红方棋子放到目标格；目标已有红棋时，交换两枚棋子的位置。
function placeSetup(pieceId,nodeId){if(phase!=='setup')return;let p=pieces.find(x=>x.id===pieceId&&x.owner===0),n=nodes.find(x=>x.id===nodeId);if(!p||!n||n.owner!==0||n.type==='camp')return;let other=pieceAt(nodeId),source=p.node;if(other&&other.id!==p.id)other.node=source;p.node=nodeId;setupSelected=null;draggedPiece=null;draw();updateSetupText()}

// 把红方棋子从棋盘拖回待布阵托盘。
function returnToTray(pieceId){let p=pieces.find(x=>x.id===pieceId&&x.owner===0);if(!p)return;p.node=null;setupSelected=null;draw();updateSetupText()}

// 在侧栏显示红方已经放置了多少枚棋子；开启元帅后总数会变成26。
function updateSetupText(){let own=pieces.filter(p=>p.owner===0),placed=own.filter(p=>p.node).length;$('#turnText').textContent=`布阵中：已放置 ${placed}/${own.length} 枚`}

// Fisher–Yates 原地洗牌。
function shuffle(a){for(let i=a.length-1;i;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

// 按军旗、地雷、炸弹的限制为红方生成随机阵型，并兼容三项作弊器。
function quickSetup(){
  if(phase!=='setup')return;
  let own=pieces.filter(p=>p.owner===0),marshal=own.find(p=>p.id==='0-cheat-marshal'&&!p.dead),regular=own.filter(p=>p!==marshal),slots=nodes.filter(n=>n.owner===0&&n.type!=='camp');
  regular.forEach(p=>p.node=null);
  // 元帅不占用25个普通布阵格，始终保留在红方第三排中央行营。
  if(marshal){let camp=nodes.find(n=>n.owner===0&&n.row===2&&n.col===2&&n.type==='camp');marshal.node=camp.id}
  let take=filter=>{let opts=slots.filter(n=>!pieceAt(n.id)&&filter(n)),n=opts[Math.floor(Math.random()*opts.length)];return n?.id};
  let flag=regular.find(p=>p.name==='军旗');flag.node=take(n=>n.type==='hq');
  regular.filter(p=>p.name==='地雷').forEach(p=>p.node=take(n=>n.row>=4));
  // 只有原生炸弹受“不能放第一排”限制；由连长变化的炸弹可以参与普通随机布阵。
  regular.filter(p=>p.name==='炸弹'&&!p.cheatedFrom).forEach(p=>p.node=take(n=>n.row!==0));
  shuffle(regular.filter(p=>!p.node)).forEach(p=>p.node=take(()=>true));
  setupSelected=null;draw();updateSetupText();log(`已按规则完成随机布阵${marshal?'，元帅保留在中央行营':''}。`);
}

// 阵型库保存在浏览器本地，可用名称保存多套阵型。
const FORMATION_KEY='armySavedFormationsV1';
function getFormations(){try{let value=JSON.parse(localStorage.getItem(FORMATION_KEY)||'[]');return Array.isArray(value)?value:[]}catch(e){return[]}}
function setFormations(value){localStorage.setItem(FORMATION_KEY,JSON.stringify(value))}

// 打开阵型管理弹窗；保存和调用共用同一个可视化列表。
function openFormationManager(focusName=false){
  if(phase!=='setup')return;
  renderFormationList();
  $('#formationModal').classList.add('show');
  if(focusName){$('#formationName').value=`阵型${getFormations().length+1}`;$('#formationName').focus()}
}

// 绘制已保存阵型，每套阵型都可以单独调用或删除。
function renderFormationList(){
  let list=$('#formationList'),formations=getFormations();
  list.innerHTML='';
  if(!formations.length){let empty=document.createElement('div');empty.className='formation-empty';empty.textContent='还没有保存的阵型';list.appendChild(empty);return}
  formations.forEach((formation,index)=>{
    let row=document.createElement('div'),name=document.createElement('span'),load=document.createElement('button'),remove=document.createElement('button');
    row.className='formation-row';name.textContent=`${formation.name}（${formation.layout.length}枚）`;
    load.className='load-one';load.textContent='调用';load.onclick=()=>applyFormation(index);
    remove.className='delete-one';remove.textContent='删除';remove.onclick=()=>deleteFormation(index);
    row.append(name,load,remove);list.appendChild(row);
  });
}

/**
 * 将当前红方布阵写入本地阵型库。相同名称会被覆盖。
 * 阵型按“棋子名称 + 格点ID”保存，因此重复棋子也能逐枚恢复。
 */
function confirmSaveFormation(){
  let placed=pieces.filter(p=>p.owner===0&&p.node),name=$('#formationName').value.trim();
  if(!placed.length)return alert('请先在棋盘上放置棋子。');
  if(!name)return alert('请输入阵型名称。');
  let formations=getFormations(),layout=placed.map(p=>({name:p.name,node:p.node})),saved={name,layout,mode:chaosMode?'chaos':'standard',cheats:chaosMode?null:{...cheats},updatedAt:Date.now()},index=formations.findIndex(f=>f.name===name);
  if(index>=0)formations[index]=saved;else formations.push(saved);
  setFormations(formations);$('#formationName').value='';renderFormationList();
  log(`💾 已保存阵型“${name}”（${layout.length}枚）`);
}

/**
 * 调用指定序号的阵型。
 * 若乱战模式当前手牌缺少某类棋子，会尽量摆放匹配棋子，其余留在托盘。
 */
function applyFormation(index){
  let formations=getFormations(),formation=formations[index];
  if(!formation)return;
  if(!chaosMode&&formation.cheats){
    pieces=pieces.filter(p=>p.id!=='0-cheat-marshal');
    pieces.filter(p=>p.owner===0&&p.cheatedFrom).forEach(p=>{p.name=p.cheatedFrom;delete p.cheatedFrom});
    cheats={platoonToCommander:false,companyToBomb:false,marshal:false};
    if(formation.cheats.platoonToCommander)toggleCheat('platoonToCommander',true);
    if(formation.cheats.companyToBomb)toggleCheat('companyToBomb',true);
    if(formation.cheats.marshal)toggleCheat('marshal',true);
  }
  let own=pieces.filter(p=>p.owner===0),used=new Set,placed=0;
  own.forEach(p=>p.node=null);
  formation.layout.forEach(item=>{
    let piece=own.find(p=>!used.has(p.id)&&p.name===item.name),node=nodes.find(n=>n.id===item.node&&n.owner===0&&n.type!=='camp');
    if(!piece||!node||pieceAt(node.id))return;
    piece.node=node.id;used.add(piece.id);placed++;
  });
  setupSelected=null;$('#formationModal').classList.remove('show');draw();updateSetupText();log(`📂 已调用阵型“${formation.name}”（成功放置${placed}枚）`);

// ==================== 5. 阵营关系、铁路寻路与合法走法 ====================

/**
 * 根据当前难度判断两方是否为盟友。
 * 简单：红紫、蓝绿；一般：仅蓝绿；困难：仅蓝绿且紫方中立；地狱：蓝紫绿。

function isAlly(a,b){

  if(difficulty==='easy')return(a===0&&b===2)||(a===2&&b===0)||(a===1&&b===3)||(a===3&&b===1);
  if(difficulty==='hell')return a>0&&b>0;

// 返回指定阵营当前的盟友和敌人编号，供电脑评分使用。
function allyOwnersOf(owner){return[0,1,2,3].filter(other=>other!==owner&&isAlly(owner,other))}

// 返回某一家的第一排格点，按列从小到大排列。

/**
 * 为普通棋子补充侧边圆角铁路的直线可达路径。

/**
 * 计算棋子在铁路上的所有可达位置，并保存每个目标对应的完整经过路径。
 * 工兵用广度优先搜索，可在铁路交叉点转向；其他棋子只能沿一条直线前进。
 * @returns {Map<string,string[]>} 目标格ID -> 经过的格点ID数组。
 */
function railRoutes(p){let n=nodes.find(x=>x.id===p.node),routes=new Map;if(!n?.rail)return routes;if(p.name==='工兵'){let queue=[[n.id,[n.id]]],seen=new Set([n.id]);while(queue.length){let [at,path]=queue.shift();for(let q of railNeighbors(at,['rail','corner-rail'])){if(seen.has(q.id))continue;seen.add(q.id);let next=[...path,q.id];routes.set(q.id,next);if(!pieceAt(q.id))queue.push([q.id,next])}}return routes}for(let first of railNeighbors(n.id,['rail','corner-rail'])){let dx=Math.sign(first.x-n.x),dy=Math.sign(first.y-n.y),at=n,next=first,path=[n.id];while(next){path.push(next.id);routes.set(next.id,[...path]);if(pieceAt(next.id))break;let onward=railNeighbors(next.id,['rail','corner-rail']).filter(x=>x.id!==at.id&&Math.sign(x.x-next.x)===dx&&Math.sign(x.y-next.y)===dy);at=next;next=onward[0]}}cornerRoutes(n,routes);return routes}

// 合并相邻公路和铁路目标，再排除友军占位及“攻击行营内棋子”的非法目标。

// 返回一枚棋子的全部合法目标；地雷、军旗以及进入大本营的棋子不能移动。

/**
 * 棋盘格点击入口。

/**

function battle(a,d){if(a.name==='炸弹'||d.name==='炸弹')return 0;if(d.name==='地雷')return a.name==='工兵'?1:-1;if(d.name==='军旗')return 1;let x=rank[a.name],y=rank[d.name];return x===y?0:x>y?1:-1}

// 红方退出战场时更新状态和日志。
function activateRedObserver(){if(redSurrendered)return;redSurrendered=true;aiOrders={1:null,2:null,3:null};log(difficulty==='easy'?'👁️ 红方退出战场，继续观看紫方盟友作战。':'🏳️ 红方退出战场')}

/**
 * 记录电脑“高级棋子未能战胜目标”的战斗经验。
 * 后排目标：优先派工兵，再派炸弹；前四排目标：优先派最大棋子，再派炸弹。
 */
function recordAiFailure(attacker,defender,node,result){
  if(attacker.owner===0||result>=0||defender.dead||isAlly(attacker.owner,defender.owner))return;
  let existing=aiOrders[attacker.owner],attackerRank=rank[attacker.name]||0;

  }

/**
 * 执行一次移动或战斗，是整局游戏最核心的状态更新函数。
 * 流程：保存轨迹 -> 播音效 -> 比较棋子 -> 处理阵亡/军旗/司令 -> 判断胜负 -> 下一回合。

// 不同模式拥有不同胜负目标。
function checkWin(){

    if(!aliveFlags[1]&&!aliveFlags[3])finish(true);
    else if(!aliveFlags[0]&&!aliveFlags[2])finish(false);
    return;
  }

  else if(difficulty==='hell'?!aliveFlags[1]&&!aliveFlags[2]&&!aliveFlags[3]:!aliveFlags[1]&&!aliveFlags[3])finish(true);

// 判断某一方是否至少有一枚棋子能走。

// 红方主动放弃当前行动；只有正式对局且轮到红方时才会生效。
function skipTurn(){

// ==================== 7. 电脑战斗记忆与走法评分 ====================

/**
 * 检查电脑当前追击任务还能否执行。
 * 若缺少指定工兵/炸弹就进入下一阶段；所有克制棋子都没有时改为避战。
 */
function normalizeAiOrder(owner,allMoves){
  let order=aiOrders[owner];if(!order)return null;
  let target=pieces.find(p=>p.id===order.targetId&&!p.dead);if(!target||isAlly(owner,target.owner)){aiOrders[owner]=null;return null}
  let available=name=>allMoves.some(m=>m.p.name===name);
  if(order.kind==='backline'){
    if(order.stage==='engineer'&&!available('工兵'))order.stage=available('炸弹')?'bomb':'avoid';
    if(order.stage==='bomb'&&!available('炸弹'))order.stage='avoid';
  }else{
    if(order.stage==='max'){
      let ranked=allMoves.filter(m=>rank[m.p.name]).sort((a,b)=>rank[b.p.name]-rank[a.p.name]);
      if(ranked.length)order.maxPieceId=ranked[0].p.id;else order.stage=available('炸弹')?'bomb':'avoid';
    }
    if(order.stage==='bomb'&&!available('炸弹'))order.stage='avoid';
  }
  return order;
}

// 给符合追击任务的走法加极高分，确保电脑按“工兵/最大棋子 -> 炸弹 -> 避战”执行。
function orderScore(move,order){
  if(!order)return 0;let target=pieces.find(p=>p.id===order.targetId&&!p.dead);if(!target)return 0;
  let targetNode=nodes.find(n=>n.id===target.node),dest=nodes.find(n=>n.id===move.id),distance=Math.abs(dest.x-targetNode.x)+Math.abs(dest.y-targetNode.y),required=order.stage==='engineer'?'工兵':order.stage==='bomb'?'炸弹':null,score=0;
  if(order.stage==='avoid'){if(move.id===target.node)return-20000;score-=Math.max(0,18-distance)*25;if(order.kind==='frontline'&&dest.type==='camp'&&dest.owner===move.p.owner&&!pieceAt(dest.id))score+=1400;return score}
  let correct=order.stage==='max'?move.p.id===order.maxPieceId:move.p.name===required;
  score+=correct?(60-distance)*70:-3600;
  if(correct&&move.id===target.node)score+=18000;
  return score;
}

/**
 * 一般难度的基础评分器。
 * omniscient=true 时，电脑可以读取红方棋子身份（困难难度使用）。
 * 分数越高，电脑越倾向选择该走法。
 */
function aiScore(move, omniscient=false) {
  let target = pieceAt(move.id);
  let dest = nodes.find(n => n.id === move.id);
  let score = Math.random() * 12;
  const self = turn;
  const allyOwners = allyOwnersOf(self);
  const enemyFocus = enemyOwnersOf(self);

  // 1. 吃子收益计算
  if (target) {
    const knownTarget = target.reveal || (omniscient && target.owner === 0);
    const tRank = knownTarget ? (rank[target.name] || 0) : 4;
    const myRank = rank[move.p.name] || 0;
    // 吃敌方棋子基础分
    if (!isAlly(self, target.owner)) {
      // 吃掉军旗极高优先级
      if (knownTarget && target.name === '军旗') score += 1200;
      // 工兵吃地雷高额加分
      else if (knownTarget && target.name === '地雷' && move.p.name === '工兵') score += 180;
      // 炸弹撞大官收益
      else if (move.p.name === '炸弹' && knownTarget && tRank >= 7) score += tRank * 45;
      // 常规吃子
      else if (move.p.name !== '炸弹') {
        if (myRank > tRank) score += tRank * 32;
        // 同归于尽适度加分，避免乱换大亏
        else if (myRank === tRank) score += tRank * 12;
        // 用小棋碰大棋大幅扣分，禁止白送
        else score -= (tRank - myRank) * 40;
      }
    }
    // 禁止吃友军
    if (isAlly(self, target.owner)) score -= 9999;
  }

  // 2. 防守权重：保护己方军旗
  const myHQ = nodes.filter(n => n.owner === self && n.type === 'hq');
  let minDistToMyFlag = Infinity;
  const myFlag = pieces.find(p => p.owner === self && p.name === '军旗' && !p.dead);
  if (myFlag) {
    const flagNode = nodes.find(n => n.id === myFlag.node);
    minDistToMyFlag = Math.abs(dest.x - flagNode.x) + Math.abs(dest.y - flagNode.y);
    // 大官向军旗靠拢防守加分
    if ((move.p.name === '司令' || move.p.name === '军长') && minDistToMyFlag <= 12) {
      score += (20 - minDistToMyFlag) * 4;
    }
    // 远离军旗、孤军深入扣分
    if (minDistToMyFlag > 16 && (move.p.name === '司令' || move.p.name === '军长')) {
      score -= 110;
    }
  }

  // 3. 工兵专项逻辑：克制原版工兵乱冲送死
  if (move.p.name === '工兵') {
    // 工兵找到通往敌方军旗路线大幅加分
    for (const e of enemyFocus) {
      if (!aliveFlags[e]) continue;
      const eFlag = pieces.find(p => p.owner === e && p.name === '军旗' && !p.dead);
      if (eFlag && (eFlag.reveal || (omniscient && e === 0))) {
        const eFlagNode = nodes.find(n => n.id === eFlag.node);
        const dist = Math.abs(dest.x - eFlagNode.x) + Math.abs(dest.y - eFlagNode.y);
        score += Math.max(0, (25 - dist)) * 6;
      }
    }
    // 工兵无掩护深入腹地大幅扣分，防止白给
    if (dest.owner !== self && !allyOwners.includes(dest.owner)) score -= 70;
    // 己方地雷周边工兵待命防守加分
    const myMines = pieces.filter(p => p.owner === self && p.name === '地雷' && !p.dead);
    for (const m of myMines) {
      const mNode = nodes.find(n => n.id === m.node);
      const d = Math.abs(dest.x - mNode.x) + Math.abs(dest.y - mNode.y);
      if (d <= 4) score += 12;
    }
    const engineers=pieces.filter(p=>p.owner===self&&p.name==='工兵'&&!p.dead).length;
    const ordered=aiOrders[self]?.stage==='engineer';
    if(engineers<=2&&!ordered&&(target||dest.owner!==self))score-=850;
  }

  // 4. 炸弹策略：不浪费，专盯敌方大官
  if (move.p.name === '炸弹') {
    // 靠近敌方高价值棋子加分
    for (const e of enemyFocus) {
      pieces.filter(p => p.owner === e && !p.dead && (p.reveal || (omniscient && e===0)) && rank[p.name] >= 7).forEach(ep => {
        const eNode = nodes.find(n => n.id === ep.node);
        const d = Math.abs(dest.x - eNode.x) + Math.abs(dest.y - eNode.y);
        if (d <= 7) score += Math.max(0, (12 - d)) * 5;
      });
    }
    // 炸弹贴脸己方司令极度危险，扣分规避
    if ((move.p.node && pieceAt(move.p.node)) && pieceAt(move.p.node).name === '司令') {
      score -= 150;
    }
  }

  // 5. 大官避险：司令/军长不乱碰未知棋子
  if ((move.p.name === '司令' || move.p.name === '军长') && target && !target.reveal && !(omniscient&&target.owner===0)) {
    score -= 130;
  }

  // 6. 低等级棋子优先试探未知子
  if ((move.p.name === '排长' || move.p.name === '连长') && target && !target.reveal && !isAlly(self, target.owner)) {
    score += 75;
  }

  // 7. 盟友协同：向盟友交战区域靠拢，配合夹击
  pieces.filter(p => allyOwners.includes(p.owner) && !p.dead).forEach(ap => {
    const aNode = nodes.find(n => n.id === ap.node);
    const dist = Math.abs(dest.x - aNode.x) + Math.abs(dest.y - aNode.y);
    if (dist <= 9) score += Math.max(0, (10 - dist)) * 3;
  });

  // 8. 劣势收缩：己方剩余棋子过少，整体向自家阵地回撤
  const myAlive = pieces.filter(p => p.owner === self && !p.dead).length;
  const totalAll = pieces.filter(p => !p.dead).length;
  if (myAlive / totalAll < 0.28) {
    const homeDist = Math.min(...myHQ.map(h => Math.abs(dest.x - h.x) + Math.abs(dest.y - h.y)));
    score += Math.max(0, (18 - homeDist)) * 3;
  }

  // 9. 进入死胡同点位小幅扣分
  const nextMoves = legal(move.p);
  if (nextMoves.length <= 1 && !target) score -= 18;

  return score;
}

/**
 * 困难难度附加评分。
 * 三方电脑可以识别红方棋子，先突破红方倒数第二排，
 * 突破后集中向红方军旗推进，并参考盟友位置形成夹击。
 */
function hardScore(move){
  let redAttacker=turn===1||turn===3||(difficulty==='hell'&&turn===2),score=aiScore(move,redAttacker),target=pieceAt(move.id),dest=nodes.find(n=>n.id===move.id),allyOwners=allyOwnersOf(turn);
  if(redAttacker&&target?.owner===0){let result=battle(move.p,target);score+=result>0?320:result===0?90:-260;if(target.name==='炸弹'&&move.p.name!=='工兵')score-=180}
  if(redAttacker){let redFlag=pieces.find(p=>p.owner===0&&p.name==='军旗'&&!p.dead),allyPieces=pieces.filter(p=>allyOwners.includes(p.owner)&&!p.dead);if(redFlag){let f=nodes.find(n=>n.id===redFlag.node),d=Math.abs(dest.x-f.x)+Math.abs(dest.y-f.y);score+=(35-d)*5}if(allyPieces.length){let support=Math.min(...allyPieces.map(p=>{let n=nodes.find(x=>x.id===p.node);return Math.abs(n.x-dest.x)+Math.abs(n.y-dest.y)}));if(support<=7)score+=(8-support)*12}}
  if(redAttacker){
    let redBack=nodes.filter(n=>n.owner===0&&n.row===4),redFlag=pieces.find(p=>p.owner===0&&p.name==='军旗'&&!p.dead),flagNode=redFlag&&nodes.find(n=>n.id===redFlag.node);
    if(!hardRedBreach){
      let breachDistance=Math.min(...redBack.map(n=>Math.abs(dest.x-n.x)+Math.abs(dest.y-n.y)));
      score+=(50-breachDistance)*85;
      if(dest.owner===0&&dest.row===4)score+=7000;
      if(target?.owner===0)score+=900;
      if(dest.owner!==0&&breachDistance>8)score-=1200;
    }else if(flagNode){
      let flagDistance=Math.abs(dest.x-flagNode.x)+Math.abs(dest.y-flagNode.y);
      score+=(60-flagDistance)*110;
      if(target?.owner===0)score+=1400;
      if(target===redFlag)score+=20000;
      if(dest.owner===0)score+=900;
      let allyFront=pieces.filter(p=>allyOwners.includes(p.owner)&&!p.dead).map(p=>nodes.find(n=>n.id===p.node));
      if(allyFront.length){let support=Math.min(...allyFront.map(n=>Math.abs(dest.x-n.x)+Math.abs(dest.y-n.y)));if(support<=6)score+=(7-support)*90}
    }
  }
  return score;
}

// 计算某个位置到指定阵营大本营（或后两排）的最短曼哈顿距离。
function distanceToOwner(dest,owner,type='hq'){
  let goals=nodes.filter(n=>n.owner===owner&&(type==='back'?n.row>=4:n.type==='hq'));
  return goals.length?Math.min(...goals.map(n=>Math.abs(n.x-dest.x)+Math.abs(n.y-dest.y))):30;
}
// 找出已经进入某方后两排的敌方棋子，用于触发紧急回防。
function backInvaders(owner){
  return pieces.filter(p=>!p.dead&&!isAlly(owner,p.owner)).filter(p=>{let n=nodes.find(x=>x.id===p.node);return n?.owner===owner&&n.row>=4});
}
/**
 * 三打一全局战略评分。
 * 后两排被红方入侵时优先回防；否则向红方推进并靠近盟友形成夹击。
 */
function strategyScore(move){
  let dest=nodes.find(n=>n.id===move.id),target=pieceAt(move.id),score=0;
  if(turn!==0){
    let invaders=backInvaders(turn);
    if(invaders.length){
      let nearest=Math.min(...invaders.map(p=>{let n=nodes.find(x=>x.id===p.node);return Math.abs(dest.x-n.x)+Math.abs(dest.y-n.y)}));
      score+=(40-nearest)*18;
      if(target&&invaders.includes(target)){
        let result=battle(move.p,target),cost=rank[move.p.name]||2;
        score+=result>0?1300-cost*18:result===0?650-cost*12:-800;
      }else if(target)score-=260;
      if(dest.owner!==turn&&nearest>3)score-=500;
    }else{
      let enemies=enemyOwnersOf(turn),focusOwner=(turn===1||turn===3||(difficulty==='hell'&&turn===2))&&enemies.includes(0)?0:null;
      if(focusOwner===null&&enemies.length)focusOwner=enemies.reduce((best,owner)=>distanceToOwner(dest,owner)<distanceToOwner(dest,best)?owner:best,enemies[0]);
      if(focusOwner!==null){
        score+=(40-distanceToOwner(dest,focusOwner))*15;
        if(target?.owner===focusOwner)score+=900;
        if(dest.owner===focusOwner)score+=360;
      }
      let allyAttackers=pieces.filter(p=>allyOwnersOf(turn).includes(p.owner)&&!p.dead).map(p=>nodes.find(n=>n.id===p.node));
      if(allyAttackers.length){let support=Math.min(...allyAttackers.map(n=>Math.abs(dest.x-n.x)+Math.abs(dest.y-n.y)));if(support<8)score+=(8-support)*22}
    }
  }
  return score;
}

/**
 * 电脑回合入口。
 * 枚举全部合法走法，将基础评分、战略评分、战斗记忆评分相加后执行最高分走法。
 * 简单难度会从前几名中随机选择，因此会保留一定失误。
 */
function ai() {
  if (over) return;
  // 筛选所有可移动棋子+全部合法走法
  const movablePieces = pieces.filter(p => p.owner === turn && !p.dead && legal(p).length > 0);
  let allMoves = [];
  movablePieces.forEach(p => {
    legal(p).forEach(destId => {
      const targetPiece = pieceAt(destId);
      // 排除吃友军的无效走法
      if (targetPiece && isAlly(p.owner, targetPiece.owner)) return;
      allMoves.push({
        p: p,
        id: destId,
        hit: !!targetPiece
      });
    });
  });

  if (allMoves.length === 0) {
    log(`⛔ ${labels[turn]}无子可走，军旗视为被俘`);
    eliminateOwner(turn);
    checkWin();
    if (!over) nextTurn();
    return draw();
  }

  const activeOrder=normalizeAiOrder(turn,allMoves);
  // 简单沿用旧困难算法；一般使用常规暗棋AI；困难和地狱启用更强的突破、识牌与协同。
  let useHard=difficulty==='easy'||difficulty==='hard'||difficulty==='hell';
  allMoves.forEach(m => m.score = (useHard?hardScore(m):aiScore(m))+strategyScore(m)*(useHard?1.35:1)+orderScore(m,activeOrder));
  allMoves.sort((a, b) => b.score - a.score);
  const bestMove = allMoves[0];
  move(bestMove.p, bestMove.id);
}

// ==================== 8. 日志、金币、胜负与页面按钮 ====================

// 把最新行动记录插入日志顶部。
function log(t){let el=document.createElement('div');el.textContent=t;$('#log').prepend(el)}

// 从浏览器本地存储读取大厅通用金币；没有记录时默认1000。
function getCoins(){let value=parseInt(localStorage.getItem('cloudCoins')||'1000',10);return Number.isFinite(value)?Math.max(0,value):1000}

// 保存金币并同步更新侧栏，余额最低为0。
function setCoins(value){value=Math.max(0,value);localStorage.setItem('cloudCoins',String(value));$('#coinCount').textContent=value;return value}

// 正常胜负结算：红方阵营获胜增加300金币，失败扣除200金币。
function finish(win){over=true;clearTimeout(aiTimer);let delta=win?300:-200,balance=getCoins();if(!settled){balance=setCoins(balance+delta);settled=true}let winTitle=difficulty==='easy'?'红紫联盟获胜！':difficulty==='hell'?'红方地狱挑战成功！':'红方获胜！',loseTitle=difficulty==='easy'?'蓝绿联盟获胜':'红方战败';$('#resultTitle').textContent=win?winTitle:loseTitle;$('#resultText').textContent=`${win?'获得 300':'失去 200'} 金币，当前余额 ${balance} 金币。`;$('#result').classList.add('show')}

// 投降会立即结束整局并按红方失败结算，即使简单模式的紫方盟友仍然存活。
function surrender(){if(over||redSurrendered)return;if(!confirm('确定投降吗？本局将立即判负并扣除200金币。'))return;clearTimeout(aiTimer);eliminateOwner(0);finish(false);draw()}

// “结束游戏”只停止当前局，不主动结算金币。
function endGame(){if(over)return;if(!confirm('确定结束当前游戏吗？'))return;clearTimeout(aiTimer);over=true;$('#resultTitle').textContent='游戏已结束';$('#resultText').textContent=settled?'本局金币已结算。':'本局主动结束，不结算金币。';$('#result').classList.add('show')}

// 每次新开一局都显示四种难度的十字以内速览。
function showDifficultyIntro(){$('#introModal').classList.add('show')}

// 重建棋盘、重新发棋并清空上一局状态，然后回到红方布阵阶段。
function start(){clearTimeout(aiTimer);buildMap();cheats={platoonToCommander:false,companyToBomb:false,marshal:false};marshalFallen=false;markingEnabled=false;markGuess='司令';deploy();phase='setup';turn=0;selected=null;setupSelected=null;lastTrail=null;lastBattle=null;purpleSafeTurns=0;purpleAttacked=false;hardRedBreach=false;redSurrendered=false;aiOrders={1:null,2:null,3:null};valid=[];aliveFlags=[true,true,true,true];over=false;settled=false;setCoins(getCoins());document.title=chaosMode?'云上乱战四国':'云上四国军棋';$('#gameTitle').textContent=chaosMode?'云上乱战四国 · 多阵营难度':'云上四国军棋 · 多阵营难度';$('#result').classList.remove('show');$('#setupActions').classList.remove('hidden');$('#formationActions').classList.remove('hidden');$('#difficulty').classList.remove('hidden');updateDifficulty();$('#log').innerHTML='';log(chaosMode?'乱战模式不提供作弊器；可快速布阵或调用阵型。':'请选择难度；可使用作弊器、快速布阵或调用阵型。');draw();updateSetupText();showDifficultyIntro()}

// 绑定难度、布阵、规则、横屏等静态按钮；最后 start() 完成首次初始化。
document.querySelectorAll('#difficulty button').forEach(b=>b.onclick=()=>{if(phase!=='setup')return;difficulty=b.dataset.level;localStorage.setItem('armyDifficulty',difficulty);updateDifficulty()});$('#quickSetup').onclick=quickSetup;$('#confirmSetup').onclick=confirmSetup;$('#saveFormation').onclick=()=>openFormationManager(true);$('#loadFormation').onclick=()=>openFormationManager(false);$('#confirmSaveFormation').onclick=confirmSaveFormation;$('#formationName').onkeydown=e=>{if(e.key==='Enter')confirmSaveFormation()};$('#closeFormation').onclick=()=>$('#formationModal').classList.remove('show');$('#closeIntro').onclick=()=>$('#introModal').classList.remove('show');$('#restart').onclick=start;$('#rulesBtn').onclick=()=>alert(`${chaosMode?'乱战分兵规则仍然生效：100枚棋子随机四等分。\\n\\n':''}简单：红紫联盟对蓝绿联盟，使用原困难AI。\\n一般：紫方开局清空，红方25枚对蓝绿50枚。\\n困难：红方对蓝绿联盟，紫方完全中立。\\n地狱：蓝绿紫三家联盟围攻红方。`);$('#landscape').onclick=async()=>{try{await document.documentElement.requestFullscreen?.();await screen.orientation?.lock?.('landscape')}catch(e){alert('请关闭竖屏锁定并横置手机')}};start();
</script></body></html>
