function pos(n){return{x:n.x/16*96+2,y:n.y/16*96+2}} function pieceAt(id){return pieces.find(p=>p.node===id&&!p.dead)}
function bindSetupPiece(el,p){el.draggable=true;el.dataset.pieceId=p.id;el.onclick=e=>{e.stopPropagation();if(setupSelected&&setupSelected!==p.id&&p.node)return placeSetup(setupSelected,p.node);setupSelected=setupSelected===p.id?null:p.id;draw()};el.ondragstart=e=>{draggedPiece=p.id;e.dataTransfer.setData('text/plain',p.id)}}
function draw(){
  board.innerHTML='';for(let [a,b,t] of edges){let A=pos(nodes.find(n=>n.id===a)),B=pos(nodes.find(n=>n.id===b)),dx=B.x-A.x,dy=B.y-A.y,l=Math.hypot(dx,dy),el=document.createElement('i');el.className=`road ${t}`;el.style.cssText=`left:${A.x}%;top:${A.y}%;width:${l}%;transform:rotate(${Math.atan2(dy,dx)*180/Math.PI}deg)`;board.appendChild(el)}
  let fontButton=document.createElement('button');fontButton.className=`font-toggle ${largeFont?'active':''}`;fontButton.textContent=largeFont?'标准字体':'放大字体';fontButton.onclick=()=>{largeFont=!largeFont;localStorage.setItem('armyLargeFont',largeFont?'1':'0');draw()};board.appendChild(fontButton);
  if(phase==='play'&&!over){let actions=document.createElement('div'),endButton=document.createElement('button');actions.className='board-actions';endButton.textContent='结束游戏';endButton.onclick=endGame;actions.appendChild(endButton);if(!redSurrendered){let surrenderButton=document.createElement('button');surrenderButton.className='surrender';surrenderButton.textContent='投降';surrenderButton.onclick=surrender;actions.appendChild(surrenderButton)}board.appendChild(actions)}
  if(lastTrail){lastTrail.path.slice(0,-1).forEach((id,i)=>{let n=nodes.find(x=>x.id===id),next=nodes.find(x=>x.id===lastTrail.path[i+1]);if(!n||!next)return;let at=pos(n),angle=Math.atan2(next.y-n.y,next.x-n.x)*180/Math.PI,el=document.createElement('span');el.className=`trail-arrow ${i===0?'start':''}`;el.textContent='➤';el.style.cssText=`left:${at.x}%;top:${at.y}%;transform:translate(-50%,-50%) rotate(${angle}deg);color:${['#8e211a','#173f8a','#603080','#17613a'][lastTrail.owner]}`;board.appendChild(el)});if(lastBattle){let n=nodes.find(x=>x.id===lastBattle);if(n){let at=pos(n),el=document.createElement('span');el.className='battle-flash';el.style.cssText=`left:${at.x}%;top:${at.y}%`;board.appendChild(el)}}}
  nodes.filter(n=>n.type!=='transit').forEach(n=>{let p=pos(n),el=document.createElement('button'),pc=pieceAt(n.id),setupTarget=phase==='setup'&&n.owner===0&&n.type!=='camp';el.className=`node ${n.type} ${n.rail?'rail':''} ${valid.includes(n.id)?'valid':''} ${selected?.node===n.id?'selected':''} ${setupTarget?'setup-target':''}`;el.style.cssText=`left:${p.x}%;top:${p.y}%`;el.dataset.id=n.id;if(pc){let hidden=pc.owner!==0&&!pc.reveal&&!(redSurrendered&&pc.owner===2);el.innerHTML=`<span class="piece ${colors[pc.owner]} ${hidden?'hidden-piece':''} ${largeFont&&!hidden?'large-label':''} ${pc.reveal?'flag-reveal':''} ${setupSelected===pc.id?'setup-selected':''}">${hidden?'':pieceLabel(pc.name)}</span>`;if(phase==='setup'&&pc.owner===0)bindSetupPiece(el.firstElementChild,pc)}else if(n.type==='camp')el.innerHTML='<span>营</span>';else if(n.type==='hq')el.textContent='本营';el.onclick=()=>clickNode(n.id);if(setupTarget){el.ondragover=e=>e.preventDefault();el.ondrop=e=>{e.preventDefault();placeSetup(e.dataTransfer.getData('text/plain')||draggedPiece,n.id)}}board.appendChild(el)})
  if(phase==='setup'){let tray=document.createElement('div');tray.className='setup-tray';tray.ondragover=e=>e.preventDefault();tray.ondrop=e=>{e.preventDefault();returnToTray(e.dataTransfer.getData('text/plain')||draggedPiece)};pieces.filter(p=>p.owner===0&&!p.node).forEach(p=>{let cell=document.createElement('div'),el=document.createElement('span');cell.className='tray-cell';el.className=`piece tray-piece red ${largeFont?'large-label':''} ${setupSelected===p.id?'setup-selected':''}`;el.textContent=pieceLabel(p.name);bindSetupPiece(el,p);cell.appendChild(el);tray.appendChild(cell)});board.appendChild(tray)}
}
function deployOwner(owner){
  let slots=nodes.filter(n=>n.owner===owner&&n.type!=='camp'),hq=slots.filter(n=>n.type==='hq'),back=slots.filter(n=>n.row>=4),pool=[...names],place=(name,filter,id)=>{let opts=slots.filter(n=>!pieceAt(n.id)&&filter(n)),n=opts[Math.floor(Math.random()*opts.length)];pieces.push({id,owner,name,node:n.id});pool.splice(pool.indexOf(name),1)};
  place('军旗',n=>n.type==='hq',`${owner}-flag`);
  for(let i=0;i<3;i++)place('地雷',n=>n.row>=4,`${owner}-mine${i}`);
  for(let i=0;i<2;i++)place('炸弹',n=>n.row!==0,`${owner}-bomb${i}`);
  place('工兵',n=>n.row===0,`${owner}-engineer0`);
  for(let i=1;i<3;i++)place('工兵',n=>n.row>=2,`${owner}-engineer${i}`);
  shuffle([...pool]).forEach((name,i)=>place(name,()=>true,`${owner}-p${i}`));

function normalizeChaosHand(hand){
  let flags=hand.map((name,i)=>name==='军旗'?i:-1).filter(i=>i>=0);
  flags.slice(1).forEach(i=>hand[i]='军长');
  if(!flags.length){let candidates=hand.map((name,i)=>({i,value:rank[name]??(name==='地雷'?10:name==='炸弹'?11:12)})).sort((a,b)=>a.value-b.value);hand[candidates[0].i]='军旗'}
  let mines=hand.map((name,i)=>name==='地雷'?i:-1).filter(i=>i>=0);
  mines.slice(9).forEach(i=>hand[i]='团长');
  return hand;
}
function makeChaosHands(){
  for(let tries=0;tries<500;tries++){
    let pool=shuffle(Array.from({length:4},()=>names).flat()),hands=[0,1,2,3].map(owner=>normalizeChaosHand(pool.slice(owner*25,owner*25+25)));
    if(hands.every(h=>{let mines=h.filter(x=>x==='地雷').length,bombs=h.filter(x=>x==='炸弹').length;return mines<=9&&bombs<=19-mines}))return hands;
  }
  return [0,1,2,3].map(()=>[...names]);
}
function deployChaosOwner(owner,hand){
  let slots=nodes.filter(n=>n.owner===owner&&n.type!=='camp'),hq=slots.filter(n=>n.type==='hq'),back=slots.filter(n=>n.row>=4),remaining=[...hand],place=(name,filter,id)=>{let opts=slots.filter(n=>!pieceAt(n.id)&&filter(n)),n=opts[Math.floor(Math.random()*opts.length)];pieces.push({id,owner,name,node:n.id});remaining.splice(remaining.indexOf(name),1)};
  place('军旗',n=>n.type==='hq',`${owner}-chaos-flag`);
  let mineCount=remaining.filter(x=>x==='地雷').length;for(let i=0;i<mineCount;i++)place('地雷',n=>n.row>=4,`${owner}-chaos-mine${i}`);
  let bombCount=remaining.filter(x=>x==='炸弹').length;for(let i=0;i<bombCount;i++)place('炸弹',n=>n.row!==0,`${owner}-chaos-bomb${i}`);
  let engineerCount=remaining.filter(x=>x==='工兵').length;
  if(engineerCount)place('工兵',n=>n.row===0,`${owner}-chaos-engineer0`);
  for(let i=1;i<Math.min(engineerCount,3);i++)place('工兵',n=>n.row>=2,`${owner}-chaos-engineer${i}`);
  for(let i=3;i<engineerCount;i++)place('工兵',n=>n.row!==0,`${owner}-chaos-engineer${i}`);

function aiScore(move, omniscient=false) {
  let target = pieceAt(move.id);

  let score = Math.random() * 12;

  const enemyFocus = self % 2 === 0 ? [1, 3] : [0, 2];

  // 1. 吃子收益计算
  if (target) {
    const knownTarget = target.reveal || (omniscient && target.owner === 0);
    const tRank = knownTarget ? (rank[target.name] || 0) : 4;
    const myRank = rank[move.p.name] || 0;
    // 吃敌方棋子基础分
    if (!isAlly(self, target.owner)) {
      // 吃掉军旗极高优先级
      if (knownTarget && target.name === '军旗') score += 1200;
      // 工兵吃地雷高额加分
      else if (knownTarget && target.name === '地雷' && move.p.name === '工兵') score += 180;
      // 炸弹撞大官收益
      else if (move.p.name === '炸弹' && knownTarget && tRank >= 7) score += tRank * 45;

      else if (move.p.name !== '炸弹') {

        else if (myRank === tRank) score += tRank * 12;
        // 用小棋碰大棋大幅扣分，禁止白送
        else score -= (tRank - myRank) * 40;
      }
    }
    // 禁止吃友军
    if (isAlly(self, target.owner)) score -= 9999;
  }

  // 2. 防守权重：保护己方军旗
  const myHQ = nodes.filter(n => n.owner === self && n.type === 'hq');
  let minDistToMyFlag = Infinity;
  const myFlag = pieces.find(p => p.owner === self && p.name === '军旗' && !p.dead);
  if (myFlag) {
    const flagNode = nodes.find(n => n.id === myFlag.node);
    minDistToMyFlag = Math.abs(dest.x - flagNode.x) + Math.abs(dest.y - flagNode.y);
    // 大官向军旗靠拢防守加分
    if ((move.p.name === '司令' || move.p.name === '军长') && minDistToMyFlag <= 12) {
      score += (20 - minDistToMyFlag) * 4;
    }
    // 远离军旗、孤军深入扣分
    if (minDistToMyFlag > 16 && (move.p.name === '司令' || move.p.name === '军长')) {
      score -= 110;
    }
  }

  // 3. 工兵专项逻辑：克制原版工兵乱冲送死
  if (move.p.name === '工兵') {
    // 工兵找到通往敌方军旗路线大幅加分
    for (const e of enemyFocus) {
      if (!aliveFlags[e]) continue;
      const eFlag = pieces.find(p => p.owner === e && p.name === '军旗' && !p.dead);
      if (eFlag && (eFlag.reveal || (omniscient && e === 0))) {
        const eFlagNode = nodes.find(n => n.id === eFlag.node);
        const dist = Math.abs(dest.x - eFlagNode.x) + Math.abs(dest.y - eFlagNode.y);
        score += Math.max(0, (25 - dist)) * 6;
      }
    }
    // 工兵无掩护深入腹地大幅扣分，防止白给
    if (dest.owner !== self && dest.owner !== ally) score -= 70;
    // 己方地雷周边工兵待命防守加分
    const myMines = pieces.filter(p => p.owner === self && p.name === '地雷' && !p.dead);
    for (const m of myMines) {
      const mNode = nodes.find(n => n.id === m.node);
      const d = Math.abs(dest.x - mNode.x) + Math.abs(dest.y - mNode.y);
      if (d <= 4) score += 12;

    const ordered=aiOrders[self]?.stage==='engineer';
    if(engineers<=2&&!ordered&&(target||dest.owner!==self))score-=850;
  }

  // 4. 炸弹策略：不浪费，专盯敌方大官
  if (move.p.name === '炸弹') {
    // 靠近敌方高价值棋子加分
    for (const e of enemyFocus) {
      pieces.filter(p => p.owner === e && !p.dead && (p.reveal || (omniscient && e===0)) && rank[p.name] >= 7).forEach(ep => {
        const eNode = nodes.find(n => n.id === ep.node);

  }

    const aNode = nodes.find(n => n.id === ap.node);

  }

  // 9. 进入死胡同点位小幅扣分
  const nextMoves = legal(move.p);
  if (nextMoves.length <= 1 && !target) score -= 18;

  return score;
}

      let flagDistance=Math.abs(dest.x-flagNode.x)+Math.abs(dest.y-flagNode.y);
      score+=(60-flagDistance)*110;
      if(target?.owner===0)score+=1400;
      if(target===redFlag)score+=20000;
      if(dest.owner===0)score+=900;
      let allyFront=pieces.filter(p=>p.owner===ally&&!p.dead).map(p=>nodes.find(n=>n.id===p.node)),support=Math.min(...allyFront.map(n=>Math.abs(dest.x-n.x)+Math.abs(dest.y-n.y)));
      if(support<=6)score+=(7-support)*90;
    }
  }
  return score;
}

function distanceToOwner(dest,owner,type='hq'){
  let goals=nodes.filter(n=>n.owner===owner&&(type==='back'?n.row>=4:n.type==='hq'));
  return goals.length?Math.min(...goals.map(n=>Math.abs(n.x-dest.x)+Math.abs(n.y-dest.y))):30;
}
function backInvaders(owner){
  return pieces.filter(p=>!p.dead&&!isAlly(owner,p.owner)).filter(p=>{let n=nodes.find(x=>x.id===p.node);return n?.owner===owner&&n.row>=4});
}
function strategyScore(move){
  let dest=nodes.find(n=>n.id===move.id),target=pieceAt(move.id),score=0;
  if(redSurrendered){
    if(turn===1||turn===3){score+=(38-distanceToOwner(dest,2))*18;if(target?.owner===2)score+=1600;if(dest.owner===2)score+=500}
    if(turn===2){let targets=[1,3],nearest=Math.min(...targets.map(owner=>distanceToOwner(dest,owner)));score+=(38-nearest)*16;if(target&&(target.owner===1||target.owner===3))score+=1500}
    return score;
  }
  if(turn===2){
    let alive=pieces.filter(p=>p.owner===2&&!p.dead).length;
    let emptyCamps=nodes.filter(n=>n.owner===2&&n.type==='camp'&&!pieceAt(n.id));
    if(purpleSafeTurns>=3){
      let enemies=pieces.filter(p=>!p.dead&&!isAlly(2,p.owner)),nearest=Math.min(...enemies.map(p=>{let n=nodes.find(x=>x.id===p.node);return Math.abs(dest.x-n.x)+Math.abs(dest.y-n.y)}));
      score+=(38-nearest)*16;
      if(target&&!isAlly(2,target.owner))score+=650;
    }else if(purpleSafeTurns>=2&&emptyCamps.length){
      if(dest.type==='camp'&&dest.owner===2&&!target)score+=1100;
      let campDist=Math.min(...emptyCamps.map(n=>Math.abs(dest.x-n.x)+Math.abs(dest.y-n.y)));
      score+=(24-campDist)*12;
      if(dest.owner!==2)score-=220;
    }else if(alive>15){
      score+=(32-distanceToOwner(dest,3))*8;
      if(target?.owner===3)score+=420;
    }else if(alive>=10){
      let flag=pieces.find(p=>p.owner===2&&p.name==='军旗'&&!p.dead),flagNode=flag&&nodes.find(n=>n.id===flag.node);
      if(flagNode)score+=(28-(Math.abs(dest.x-flagNode.x)+Math.abs(dest.y-flagNode.y)))*14;
      if(dest.owner!==2)score-=260;
      if(target&&target.owner!==2)score+=80;
    }else{
      score+=(32-distanceToOwner(dest,1))*9;
      if(target?.owner===1)score+=460;
    }
  }
  if(turn===1||turn===3){
    let invaders=backInvaders(turn);
    if(invaders.length){
      let nearest=Math.min(...invaders.map(p=>{let n=nodes.find(x=>x.id===p.node);return Math.abs(dest.x-n.x)+Math.abs(dest.y-n.y)}));
      score+=(40-nearest)*18;
      if(target&&invaders.includes(target)){
        let result=battle(move.p,target),cost=rank[move.p.name]||2;
        score+=result>0?1300-cost*18:result===0?650-cost*12:-800;
      }else if(target)score-=260;
      if(dest.owner!==turn&&nearest>3)score-=500;
    }else{
      score+=(34-distanceToOwner(dest,2))*10;
      if(target?.owner===2)score+=520;
      let ally=turn===1?3:1,allyAttackers=pieces.filter(p=>p.owner===ally&&!p.dead).map(p=>nodes.find(n=>n.id===p.node));
      let support=Math.min(...allyAttackers.map(n=>Math.abs(dest.x-n.x)+Math.abs(dest.y-n.y)));
      if(support<8)score+=(8-support)*16;
    }
  }
  return score;
}

function ai() {
  if (over) return;
  // 筛选所有可移动棋子+全部合法走法
  const movablePieces = pieces.filter(p => p.owner === turn && !p.dead && legal(p).length > 0);
  let allMoves = [];
  movablePieces.forEach(p => {
    legal(p).forEach(destId => {
      const targetPiece = pieceAt(destId);
      // 排除吃友军的无效走法
      if (targetPiece && isAlly(p.owner, targetPiece.owner)) return;
      allMoves.push({
        p: p,
        id: destId,
        hit: !!targetPiece
      });
    });
  });

  if (allMoves.length === 0) {
    log(`⛔ ${labels[turn]}无子可走，军旗视为被俘`);
    eliminateOwner(turn);
    checkWin();
    if (!over) nextTurn();
    return draw();
  }

  const activeOrder=normalizeAiOrder(turn,allMoves);
  if(difficulty==='easy'){
    allMoves.forEach(m=>m.score=strategyScore(m)+orderScore(m,activeOrder)+Math.random()*180);
    allMoves.sort((a,b)=>b.score-a.score);
    let pool=allMoves.slice(0,Math.min(5,allMoves.length)),randomMove=pool[Math.floor(Math.random()*pool.length)];
    return move(randomMove.p,randomMove.id);
  }
  // 一般难度使用暗棋策略；困难难度的蓝绿可读取玩家棋子并协同。
  allMoves.forEach(m => m.score = (difficulty==='hard'?hardScore(m):aiScore(m))+strategyScore(m)*(difficulty==='hard'?1.35:1)+orderScore(m,activeOrder));
  allMoves.sort((a, b) => b.score - a.score);
  const bestMove = allMoves[0];
  move(bestMove.p, bestMove.id);
}
function log(t){let el=document.createElement('div');el.textContent=t;$('#log').prepend(el)}
function getCoins(){let value=parseInt(localStorage.getItem('cloudCoins')||'1000',10);return Number.isFinite(value)?Math.max(0,value):1000}
function setCoins(value){value=Math.max(0,value);localStorage.setItem('cloudCoins',String(value));$('#coinCount').textContent=value;return value}
function finish(win){over=true;let delta=win?300:-200,balance=getCoins();if(!settled){balance=setCoins(balance+delta);settled=true}$('#resultTitle').textContent=win?'红紫联盟获胜！':'蓝绿联盟获胜';$('#resultText').textContent=`${win?'获得 300':'失去 200'} 金币，当前余额 ${balance} 金币。`;$('#result').classList.add('show')}
function surrender(){if(over||redSurrendered)return;if(!confirm('确定投降吗？将扣除200金币并转为观战，紫方棋子会对你公开。'))return;clearTimeout(aiTimer);eliminateOwner(0);if(!settled){setCoins(getCoins()-200);settled=true}log('红方已主动投降，蓝绿将进攻紫方，紫方将同时反击蓝绿');$('#turnText').textContent='红方观战中';draw();checkWin();if(!over){turn=0;nextTurn()}}
function endGame(){if(over)return;if(!confirm('确定结束当前游戏吗？'))return;clearTimeout(aiTimer);over=true;$('#resultTitle').textContent='游戏已结束';$('#resultText').textContent=settled?'本局金币已结算。':'本局主动结束，不结算金币。';$('#result').classList.add('show')}
function start(){clearTimeout(aiTimer);buildMap();deploy();phase='setup';turn=0;selected=null;setupSelected=null;lastTrail=null;lastBattle=null;purpleSafeTurns=0;purpleAttacked=false;hardRedBreach=false;redSurrendered=false;aiOrders={1:null,2:null,3:null};valid=[];aliveFlags=[true,true,true,true];over=false;settled=false;setCoins(getCoins());document.title=chaosMode?'云上乱战四国':'云上四国军棋';$('#gameTitle').textContent=chaosMode?'云上乱战四国 · 随机分兵':'云上四国军棋 · 暗棋模式';$('#result').classList.remove('show');$('#setupActions').classList.remove('hidden');$('#difficulty').classList.remove('hidden');updateDifficulty();$('#log').innerHTML='';log(chaosMode?'100枚棋子已随机分给四家；请查看红方所得25枚棋子并完成布阵。':'请选择电脑难度并完成布阵。');$('#rules').textContent=chaosMode?'乱战规则：100枚棋子随机四等分；多余军旗异化为军长，无军旗则最小棋子异化为军旗；超过9枚的地雷异化为团长。其余规则与四国军棋一致。':'侧边铁路：本方侧边前五点与邻家侧边前五点连续相通，遇到棋子立即停止；普通棋子不能转入邻家第一排，工兵可在铁路交叉点转向。';draw();updateSetupText()}
document.querySelectorAll('#difficulty button').forEach(b=>b.onclick=()=>{if(phase!=='setup')return;difficulty=b.dataset.level;localStorage.setItem('armyDifficulty',difficulty);updateDifficulty()});$('#quickSetup').onclick=quickSetup;$('#confirmSetup').onclick=confirmSetup;$('#restart').onclick=start;$('#rulesBtn').onclick=()=>alert(chaosMode?'乱战四国：标准100枚棋子彻底洗牌，四家各得25枚。每方保留第一面军旗，多出的军旗按军长使用；没有军旗的一方由最小棋子异化为军旗；超过9枚的地雷异化为团长。布阵、联盟、走棋、淘汰及胜负规则与四国军棋一致。':'紫方：15枚以上猛攻绿方，10—15枚收缩护旗，少于10枚猛攻蓝方。蓝绿优先合作进攻紫方；任一方后两排被红紫入侵时，立即转入防守并优先清除入侵棋子。困难模式下蓝绿可识别玩家棋子并选择最优应对。');$('#landscape').onclick=async()=>{try{await document.documentElement.requestFullscreen?.();await screen.orientation?.lock?.('landscape')}catch(e){alert('请关闭竖屏锁定并横置手机')}};start();
</script></body></html>
