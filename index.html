<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>云牌游戏大厅</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;color:#f8e8bd;font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#07110f;overflow:hidden}
    body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% 45%,#28644d 0,#12372c 28%,#091814 64%,#030807 100%)}
    .cloud{position:fixed;font-size:150px;opacity:.045}.a{left:-30px;top:8%}.b{right:-30px;bottom:8%;transform:rotate(180deg)}
    main{position:relative;z-index:1;min-height:100vh;display:grid;place-items:center;padding:30px}
    .shell{width:min(1000px,94vw)}
    .title{text-align:center;margin-bottom:24px}.seal{display:grid;place-items:center;width:58px;height:58px;margin:0 auto 18px;border:1px solid #d5aa5e;transform:rotate(45deg);color:#ffe2a2;font:700 15px serif}.seal span{transform:rotate(-45deg)}
    h1{margin:0;font:700 36px "STKaiti","KaiTi",serif;letter-spacing:8px;color:#ffe5a5;text-shadow:0 4px 20px #000}.subtitle{margin:9px 0;color:#9fb7aa;font-size:13px;letter-spacing:3px}
    .login{display:flex;justify-content:center;gap:9px;margin-bottom:26px}.login input{width:220px;padding:11px 16px;border:1px solid #b58a49;border-radius:22px;background:#07100dbb;color:#fff3cf;outline:none}.login button{padding:10px 20px;border:0;border-radius:22px;background:linear-gradient(#ffe19a,#c88a33);color:#442605;font-weight:800;cursor:pointer}
    .welcome{text-align:center;height:22px;margin-bottom:12px;color:#d9c49b}.coins{text-align:center;margin:-5px 0 16px;color:#ffd77e;font-weight:700}
    .games{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.game-card{position:relative;min-height:330px;padding:24px;border:1px solid #b88a4788;border-radius:20px;overflow:hidden;background:linear-gradient(145deg,#ffffff0e,#00000038);box-shadow:0 24px 60px #0008;transition:.25s}.game-card:hover{transform:translateY(-7px);border-color:#e1b965;box-shadow:0 30px 70px #000b}
    .game-card:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 78% 22%,var(--glow),transparent 42%);pointer-events:none}
    .ddz{--glow:#d94a2d38}.zjh{--glow:#d4a82738}.jq{--glow:#6d78e03d}.icon{font-size:64px;filter:drop-shadow(0 10px 12px #0008)}h2{font:700 28px "KaiTi",serif;margin:12px 0 7px;color:#ffe4a2;letter-spacing:3px}.desc{height:70px;color:#b6c6bc;line-height:1.7;font-size:13px}.tags{display:flex;gap:5px;margin:16px 0;flex-wrap:wrap}.tag{padding:4px 8px;border:1px solid #ffffff1a;border-radius:12px;color:#d8c39b;font-size:10px}.enter{display:inline-block;padding:11px 25px;border:1px solid #d0a454;border-radius:24px;background:#2b170d;color:#ffe5ac;text-decoration:none;font-weight:700}.enter:hover{background:#d49a42;color:#3f2308}
    @media(max-width:700px){body{overflow:auto}.cloud{font-size:90px}main{display:block;padding:20px 14px}.shell{width:100%}.title{margin-bottom:16px}.seal{width:42px;height:42px;margin-bottom:13px}h1{font-size:27px;letter-spacing:4px}.subtitle{font-size:11px}.login{flex-wrap:nowrap;margin-bottom:15px}.login input{min-width:0;width:100%}.login button{flex:0 0 auto;padding:9px 13px}.welcome{font-size:13px}.games{grid-template-columns:1fr;gap:14px}.game-card{min-height:0;padding:19px}.icon{float:right;font-size:54px}h2{font-size:25px;margin-top:4px}.desc{height:auto;min-height:52px}.tags{margin:12px 0}.enter{width:100%;text-align:center;padding:10px}.coins{margin-bottom:12px}}
  </style>
</head>
<body>
  <div class="cloud a">☁</div><div class="cloud b">☁</div>
  <main><div class="shell">
    <div class="title"><div class="seal"><span>云牌</span></div><h1>云牌游戏大厅</h1><p class="subtitle">闲坐一局 · 胜负皆欢</p></div>
    <div class="login"><input id="nickname" maxlength="10" placeholder="请输入玩家昵称"><button id="loginBtn">进入大厅</button></div>
    <div class="welcome" id="welcome">登录后选择一款游戏</div><div class="coins">共享金币：<b id="coins">1000</b></div>
    <section class="games">
      <article class="game-card ddz"><div class="icon">🀄</div><h2>斗地主</h2><div class="desc">经典三人对局，叫地主、智能出牌、永久记牌器与趣味偷牌气球。</div><div class="tags"><span class="tag">三人竞技</span><span class="tag">语音播报</span><span class="tag">道具玩法</span></div><a class="enter" href="dou-dizhu.html">进入斗地主</a></article>
      <article class="game-card zjh"><div class="icon">🃏</div><h2>炸金花</h2><div class="desc">八人同桌的胆识较量，看牌、跟注、加注、弃牌或指定对手比牌。</div><div class="tags"><span class="tag">八人博弈</span><span class="tag">金币下注</span><span class="tag">暗牌竞技</span></div><a class="enter" href="zha-jin-hua.html">进入炸金花</a></article>
      <article class="game-card jq"><div class="icon">🎖️</div><h2>四国军棋</h2><div class="desc">正对面结盟的四方暗棋战场。铁路突袭、工兵排雷、炸弹兑子，协力夺取敌军军旗。</div><div class="tags"><span class="tag">对家结盟</span><span class="tag">暗棋模式</span><span class="tag">智能对手</span></div><a class="enter" href="four-army-chess.html">进入四国军棋</a></article>
    </section>
  </div></main>
  <script>
    const input=document.querySelector('#nickname'),welcome=document.querySelector('#welcome');
    input.value=localStorage.getItem('cloudPlayer')||'';
    function login(){let name=input.value.trim()||'云游客';localStorage.setItem('cloudPlayer',name);if(!localStorage.getItem('cloudCoins'))localStorage.setItem('cloudCoins','1000');welcome.textContent=`欢迎回来，${name}。请选择游戏。`;document.querySelector('#coins').textContent=localStorage.getItem('cloudCoins')}
    document.querySelector('#loginBtn').onclick=login;input.onkeydown=e=>{if(e.key==='Enter')login()};document.querySelector('#coins').textContent=localStorage.getItem('cloudCoins')||1000;if(input.value)login();
    document.querySelectorAll('.enter').forEach(a=>a.onclick=e=>{if(!localStorage.getItem('cloudPlayer')){e.preventDefault();login();location.href=a.href}})
  </script>
</body>
</html>
