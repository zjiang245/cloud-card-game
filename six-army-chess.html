</main><script>
const names=['司令','军长','师长','师长','旅长','旅长','团长','团长','营长','营长','连长','连长','连长','排长','排长','排长','工兵','工兵','工兵','炸弹','炸弹','地雷','地雷','地雷','军旗'];

const colors=['red','blue','purple','green','orange','cyan'],labels=['红国','蓝国','紫国','绿国','橙国','青国'],short={'司令':'司','军长':'军','师长':'师','旅长':'旅','团长':'团','营长':'营','连长':'连','排长':'排','工兵':'兵','炸弹':'弹','地雷':'雷','军旗':'旗'};

let nodes=[],edges=[],railLines=[],pieces=[],turn=0,selected=null,valid=[],alive=[true,true,true,true,true,true],over=false,phase='setup',setupSelected=null,draggedPiece=null,formationSaveMode=false,allianceUsedThisTurn=false,mode=localStorage.getItem('sixArmyMode')||'dark',alliances=[],aiTimer=null,lastTrail=null,lastBattle=null,replayFrames=[],replayIndex=0,replayMode=false,replayTimer=null,replayReturnState=null;
function setBoardZoom(v){boardZoom=Math.max(.75,Math.min(1.45,Math.round(v*20)/20));document.documentElement.style.setProperty('--board-zoom',boardZoom);localStorage.setItem('sixArmyBoardZoom',boardZoom);let t=$('#zoomText');if(t)t.textContent=`${Math.round(boardZoom*100)}%`}

function node(id){return nodes.find(n=>n.id===id)}function pieceAt(id){return pieces.find(p=>!p.dead&&p.node===id)}function shuffle(a){return a.sort(()=>Math.random()-.5)}function countLive(owner){return pieces.filter(p=>p.owner===owner&&!p.dead&&p.name!=='军旗').length}
function isNeighbor(a,b){let d=Math.abs(a-b);return d===1||d===5}function isAllied(a,b){return alliances[a]?.[b]}function setAlliance(a,b,on=true){alliances[a][b]=alliances[b][a]=on}
function allianceCount(owner){return alliances[owner]?.filter(Boolean).length||0}
function allianceLimitReason(a,b){if(isAllied(a,b))return'';if(allianceCount(a)>=2)return`${labels[a]}盟友已达2个上限。`;if(allianceCount(b)>=2)return`${labels[b]}盟友已达2个上限。`;return''}

function addEdge(a,b,type='road'){if(!a||!b||edges.some(e=>(e.a===a&&e.b===b)||(e.a===b&&e.b===a)))return;edges.push({a,b,type})}
function addRailLine(...ids){railLines.push(ids.filter(Boolean))}

function buildMap(){
  nodes=[];edges=[];railLines=[];const center={x:50,y:50};
  for(let o=0;o<6;o++){
    const ang=(90+o*60)*Math.PI/180,dir={x:Math.cos(ang),y:Math.sin(ang)},perp={x:-Math.sin(ang),y:Math.cos(ang)};
    for(let r=0;r<6;r++)for(let c=0;c<5;c++){

      addNode({id:key(o,r,c),owner:o,row:r,col:c,type,rail,x:center.x+dir.x*dist+perp.x*spread,y:center.y+dir.y*dist+perp.y*spread});
    }
  }
  [
    ['mid-top',57.8,36.5],
    ['mid-ul',42.2,36.5],['mid-u1',50.0,41.0],['mid-u2',57.8,45.5],['mid-ur',65.6,50.0],

    ['mid-ll',34.4,50.0],['mid-d1',42.2,54.5],['mid-d2',50.0,59.0],['mid-lr',57.8,63.5],
    ['mid-bottom',42.2,63.5]
  ].forEach(([id,x,y],i)=>addNode({id,owner:-1,row:Math.floor(i/4),col:i,type:'center',rail:true,x,y}));
  for(let o=0;o<6;o++){
    for(let r=0;r<6;r++)for(let c=0;c<5;c++){
      const a=key(o,r,c),n=node(a);
      [[r+1,c],[r,c+1]].forEach(([rr,cc])=>{if(rr<6&&cc<5){let b=key(o,rr,cc),m=node(b),back=Math.min(n.row,m.row)===4&&Math.max(n.row,m.row)===5;addEdge(a,b,!back&&n.rail&&m.rail?'rail':'road')}});
      if(n.type==='camp')[[r-1,c-1],[r-1,c+1],[r+1,c-1],[r+1,c+1]].forEach(([rr,cc])=>{if(rr>=0&&rr<6&&cc>=0&&cc<5)addEdge(a,key(o,rr,cc),'road')});
    }

  if(target){captureSound();resultText=battle(p,target);if(!p.dead&&p.node===to&&dest.type==='hq')p.stuck=true}else{moveSound();p.node=to;if(dest.type==='hq')p.stuck=true;log(`${labels[p.owner]}${p.name}移动。`)}
  let caption=target?`${labels[attackerOwner]}${attackerName}攻击${labels[defenderOwner]}${defenderName}：${resultText}`:`${labels[attackerOwner]}${attackerName}移动`;
  recordReplayFrame(caption);draw();checkEnd();if(!over)nextTurn();
}
function battle(a,d){
  let result='',text=`${labels[a.owner]}${a.name}进攻${labels[d.owner]}${d.name}：`;
  if(a.name==='炸弹'||d.name==='炸弹'){a.dead=d.dead=true;result='同归于尽'}
  else if(d.name==='地雷'){if(a.name==='工兵'){d.dead=true;a.node=d.node;result='工兵排雷'}else{a.dead=d.dead=true;result='撞雷同归于尽'}}
  else if(d.name==='军旗'){d.dead=true;a.node=d.node;result='扛旗成功';eliminate(d.owner,a.owner);promoteOfficers(a.owner)}
  else{let ar=rank[a.name]||0,dr=rank[d.name]||0;if(ar>dr){d.dead=true;a.node=d.node;result='胜'}else if(ar<dr){a.dead=true;result='败'}else{a.dead=d.dead=true;result='同归于尽'}}
  let commanderDied=(a.name==='司令'&&a.dead)||(d.name==='司令'&&d.dead);
  if(a.name==='司令'&&a.dead)revealFlag(a.owner);
  if(d.name==='司令'&&d.dead)revealFlag(d.owner);
  if(commanderDied)commanderDeathSound();
  log(text+result);return result;
}
function revealFlag(owner){let f=pieces.find(x=>x.owner===owner&&x.name==='军旗'&&!x.dead);if(f){f.reveal=true;log(`🚩 ${labels[owner]}司令阵亡，军旗位置暴露。`)}}
function promoteOfficers(owner){
  const up={'排长':'连长','连长':'营长','营长':'团长','团长':'旅长','旅长':'师长','师长':'军长','军长':'司令'};
  let promoted=0;
  pieces.forEach(p=>{if(p.owner===owner&&!p.dead&&up[p.name]){p.name=up[p.name];promoted++}});
  if(promoted){let msg=`🎖 ${labels[owner]}俘获军旗，全体存活军官官升一级！`;log(msg);alert(msg)}
}
function recordReplayFrame(caption){
  if(phase!=='play'||replayMode)return;
  replayFrames.push({caption,pieces:JSON.parse(JSON.stringify(pieces)),alive:[...alive],turn,lastTrail:lastTrail?JSON.parse(JSON.stringify(lastTrail)):null,lastBattle})
}
function showReplayFrame(index){
  if(!replayFrames.length)return;
  replayIndex=Math.max(0,Math.min(index,replayFrames.length-1));
  let frame=replayFrames[replayIndex];
  pieces=JSON.parse(JSON.stringify(frame.pieces)).map(p=>({...p,reveal:true}));
  alive=[...frame.alive];turn=frame.turn;lastTrail=frame.lastTrail?JSON.parse(JSON.stringify(frame.lastTrail)):null;lastBattle=frame.lastBattle;selected=null;valid=[];draw();
  $('#replayProgress').textContent=`${replayIndex+1} / ${replayFrames.length}`;
  $('#replayCaption').textContent=frame.caption;
  $('#turnText').textContent=`全明复盘 · ${frame.caption}`;
  $('#replayPrev').disabled=replayIndex===0;
  $('#replayNext').disabled=replayIndex===replayFrames.length-1;
}
function stopReplayAuto(){clearInterval(replayTimer);replayTimer=null;$('#replayPlay').textContent='自动播放'}
function toggleReplayAuto(){
  if(replayTimer)return stopReplayAuto();
  $('#replayPlay').textContent='暂停';
  replayTimer=setInterval(()=>{if(replayIndex>=replayFrames.length-1)return stopReplayAuto();showReplayFrame(replayIndex+1)},900);
}
function openReplay(){
  if(!replayFrames.length)return alert('本局还没有可复盘的步骤。');
  clearTimeout(aiTimer);stopReplayAuto();
  replayReturnState={pieces:JSON.parse(JSON.stringify(pieces)),alive:[...alive],turn,lastTrail:lastTrail?JSON.parse(JSON.stringify(lastTrail)):null,lastBattle,turnText:$('#turnText').textContent,logHTML:$('#log').innerHTML,over};
  replayMode=true;over=true;$('#result').classList.remove('show');$('#replayControls').classList.add('show');showReplayFrame(0);
}
function exitReplay(){
  stopReplayAuto();replayMode=false;$('#replayControls').classList.remove('show');
  if(replayReturnState){
    pieces=replayReturnState.pieces;alive=replayReturnState.alive;turn=replayReturnState.turn;lastTrail=replayReturnState.lastTrail;lastBattle=replayReturnState.lastBattle;over=replayReturnState.over;
    $('#turnText').textContent=replayReturnState.turnText;$('#log').innerHTML=replayReturnState.logHTML;
  }
  replayReturnState=null;draw();$('#result').classList.add('show');
}
function eliminate(owner,killer){
  if(!alive[owner])return;alive[owner]=false;pieces.forEach(p=>{if(p.owner===owner)p.dead=true});for(let i=0;i<6;i++)setAlliance(owner,i,false);log(`🏳 ${labels[owner]}军旗被${labels[killer]}扛走，本国淘汰。`)
}
function forfeitNoMoves(owner){
  if(!alive[owner])return false;
  alive[owner]=false;pieces.forEach(p=>{if(p.owner===owner)p.dead=true});for(let i=0;i<6;i++)setAlliance(owner,i,false);
  log(`🏳 ${labels[owner]}无棋可走，判负淘汰，全部棋子清空。`);recordReplayFrame(`${labels[owner]}无棋可走，全部棋子清空`);return true;
}
function nextTurn(){
  for(let i=1;i<=6;i++){
    let n=(turn+i)%6;
    if(!alive[n])continue;
    if(pieces.some(p=>p.owner===n&&!p.dead&&legalMoves(p).length)){turn=n;if(turn===0)allianceUsedThisTurn=false;draw();if(turn!==0&&!over){clearTimeout(aiTimer);aiTimer=setTimeout(aiMove,1450)}return}
    forfeitNoMoves(n);checkEnd();if(over){draw();return}
  }
  draw();
}
function aiMove(){
  if(over||turn===0)return;maybeAiDiplomacy(turn);
  let mine=pieces.filter(p=>p.owner===turn&&!p.dead),moves=[];
  mine.forEach(p=>legalMoves(p).forEach(to=>{let t=pieceAt(to),score=Math.random()*2+(t?8+(t.name==='军旗'?100:rank[t.name]||3):0)-distanceToEnemyFlag(to,turn)*.08;moves.push({p,to,score})}));
  if(!moves.length){forfeitNoMoves(turn);checkEnd();if(!over)nextTurn();else draw();return}
  moves.sort((a,b)=>b.score-a.score);movePiece(moves[0].p,moves[0].to);
}
function distanceToEnemyFlag(id,owner){let n=node(id),flags=pieces.filter(p=>!p.dead&&p.name==='军旗'&&p.owner!==owner&&!isAllied(owner,p.owner));if(!flags.length)return 0;return Math.min(...flags.map(f=>Math.hypot(node(f.node).x-n.x,node(f.node).y-n.y)))}
function maybeAiDiplomacy(owner){
  if(allianceCount(owner)>=2)return;
  if(Math.random()>.18)return;let options=[(owner+1)%6,(owner+5)%6].filter(o=>alive[o]&&!isAllied(owner,o)&&allianceCount(o)<2);if(!options.length)return;
  let strong=alive.map((v,i)=>v?countLive(i):-1).indexOf(Math.max(...alive.map((v,i)=>v?countLive(i):-1)));let target=options.includes(strong)?options.find(o=>o!==strong)??options[0]:options[Math.floor(Math.random()*options.length)];
  if(Math.random()<.45){
    let limit=allianceLimitReason(owner,target);
    if(limit){notify(`⚠ ${labels[owner]}尝试与${labels[target]}结盟失败：${limit}`);return}
    if(target===0){
      let ok=confirm(`🤝 ${labels[owner]}向你发起结盟申请，是否接受？\n\n提示：每个国家最多只能有两个盟友。`);
      if(ok){setAlliance(owner,0,true);notify(`🤝 你接受了${labels[owner]}的结盟申请。半明模式下可互见棋子。`)}
      else notify(`❌ 你拒绝了${labels[owner]}的结盟申请。`);
      return;
    }
    setAlliance(owner,target,true);notify(`🤝 ${labels[owner]}与${labels[target]}临时结盟，准备制衡强敌。`);
  }
}
function requestAlliance(other){
  if(phase!=='play'||turn!==0||over||!alive[other]||other===0)return;
  if(allianceUsedThisTurn){notify('⚠ 每回合只能进行一次外交。');draw();return}
  allianceUsedThisTurn=true;
  if(isAllied(0,other)){setAlliance(0,other,false);notify(`⚑ 你已解除与${labels[other]}的盟约。`);draw();return}
  let limit=allianceLimitReason(0,other);
  if(limit){notify(`⚠ 结盟失败：${limit}`);draw();return}
  let diff=countLive(other)-countLive(0),reject=diff>=4?.9:diff>=0?.8:.5;
  if(Math.random()<reject)notify(`❌ ${labels[other]}拒绝结盟。`);else{setAlliance(0,other,true);notify(`🤝 ${labels[other]}接受结盟。半明模式下可互见棋子。`)}draw();
}
function surrenderGame(){
  if(phase!=='play'||over||replayMode)return;
  clearTimeout(aiTimer);over=true;selected=null;valid=[];recordReplayFrame('红国投降，全局游戏结束');
  $('#resultTitle').textContent='红国投降';
  $('#resultText').textContent='你选择投降，本局六国军棋已直接结束。';
  $('#result').classList.add('show');log('🏳 红国投降，全局游戏结束。');draw();
}
function checkEnd(){
  let survivors=alive.map((v,i)=>v?i:-1).filter(i=>i>=0);
  if(survivors.length<=1){over=true;clearTimeout(aiTimer);let win=survivors[0]===0;$('#resultTitle').textContent=win?'六国归一，红国胜利！':'战局落幕';$('#resultText').textContent=survivors.length?`${labels[survivors[0]]}保存最后一面军旗。`:'六国俱灭。';$('#result').classList.add('show');log(win?'🎉 你赢得六国军棋。':'☁ 对局结束。')}
}
function setCoins(){if(!localStorage.getItem('cloudCoins'))localStorage.setItem('cloudCoins','1000');$('#coinCount').textContent=localStorage.getItem('cloudCoins')}
function start(){
  clearTimeout(aiTimer);stopReplayAuto();replayMode=false;replayFrames=[];replayIndex=0;replayReturnState=null;$('#replayControls').classList.remove('show');$('#diplomacyModal').classList.remove('show');buildMap();pieces=[];alliances=Array.from({length:6},()=>Array(6).fill(false));alive=[true,true,true,true,true,true];phase='setup';turn=0;selected=null;valid=[];setupSelected=null;allianceUsedThisTurn=false;over=false;lastTrail=null;lastBattle=null;$('#log').innerHTML='';$('#result').classList.remove('show');setCoins();
  createPlayerPieces();for(let i=1;i<6;i++)deployOwner(i);
  log('请先布置红国棋子：军旗进大本营，地雷最后两行，炸弹不能第一排。');draw();
}
document.querySelectorAll('#modeRow button').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;localStorage.setItem('sixArmyMode',mode);draw();log(`已切换为${mode==='dark'?'暗棋':mode==='semi'?'半明':'全明'}模式。`)});
$('#openReplay').onclick=openReplay;$('#replayPrev').onclick=()=>{stopReplayAuto();showReplayFrame(replayIndex-1)};$('#replayNext').onclick=()=>{stopReplayAuto();showReplayFrame(replayIndex+1)};$('#replayPlay').onclick=toggleReplayAuto;$('#replayExit').onclick=exitReplay;$('#closeDiplomacy').onclick=()=>$('#diplomacyModal').classList.remove('show');
$('#restart').onclick=start;$('#rulesBtn').onclick=()=>alert('六国军棋：6人每方25枚；军旗被扛本国淘汰，直到仅存一国。公路一步，铁路直线快行，工兵铁路可转弯。行营安全不可被吃。暗棋隐藏敌方，半明可见盟友，全明全体可见。电脑外交拒绝率按棋子数量差执行。');
$('#quickSetup').onclick=quickSetup;$('#confirmSetup').onclick=confirmSetup;$('#saveFormation').onclick=()=>openFormationManager(true);$('#loadFormation').onclick=()=>openFormationManager(false);$('#confirmSaveFormation').onclick=confirmSaveFormation;$('#formationName').onkeydown=e=>{if(e.key==='Enter')confirmSaveFormation()};$('#closeFormation').onclick=()=>$('#formationModal').classList.remove('show');
$('#landscape').onclick=async()=>{try{await document.documentElement.requestFullscreen?.();await screen.orientation?.lock?.('landscape')}catch(e){alert('请关闭竖屏锁定并横置手机')}};
$('#zoomOut').onclick=()=>setBoardZoom(boardZoom-.1);$('#zoomIn').onclick=()=>setBoardZoom(boardZoom+.1);$('#zoomText').onclick=()=>setBoardZoom(1);setBoardZoom(boardZoom);
start();
